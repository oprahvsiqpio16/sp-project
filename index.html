<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق الآمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: #0a0e17; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; overflow: hidden; }
        .container { text-align: center; width: 90%; max-width: 400px; }
        .loader-box { background: #141b2b; padding: 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .shield { font-size: 50px; color: #00f2fe; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4facfe, #00f2fe); transition: 0.1s; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
    </style>
</head>
<body>
    <div class="container" id="loader">
        <div class="loader-box">
            <div class="shield">🛡️</div>
            <div id="status-text">جاري تشفير الجلسة 0%</div>
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        </div>
    </div>
    <script>
        let p = 0;
        const interval = setInterval(() => {
            p += Math.floor(Math.random() * 4) + 1;
            if (p >= 100) {
                p = 100;
                clearInterval(interval);
                setTimeout(() => { window.location.href = "login.html"; }, 500);
            }
            document.getElementById("fill").style.width = p + "%";
            document.getElementById("status-text").innerText = `جاري تأمين الاتصال ${p}%`;
        }, 50);
    </script>
</body>
</html>
