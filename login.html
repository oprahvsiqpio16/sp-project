<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <script>
        // سحب البيانات من السيرفر عند فتح الصفحة
        async function loadConfig() {
            const res = await fetch('/api/get');
            const data = await res.json();
            document.getElementById('mainImg').src = data.image;
            document.getElementById('mainLetter').innerText = data.letter;
            document.getElementById('mainBtn').innerText = data.button;
        }
        window.onload = loadConfig;
    </script>
</head>
<body>
    <img id="mainImg" src="" style="width:100%">
    <h2 id="mainLetter">...</h2>
    <form id="loginForm">
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة السر">
        <button id="mainBtn" type="submit">إرسال</button>
    </form>
    </body>
</html>
